<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kitchen Dashboard – Nearbite Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --brand: #FC8019;
      --bg-dark: #121212;
      --bg-panel: #1e1e1e;
      --bg-card: #2a2a2a;
      --text-main: #f3f4f6;
      --text-sub: #9ca3af;
      --border: #374151;
      
      --color-new: #ef4444;
      --color-prep: #eab308;
      --color-ready: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      height: 100dvh; /* Mobile safe height */
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top Navigation Bar ── */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--bg-panel);
      padding: 12px 16px; /* Tighter padding for mobile */
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 12px;
    }
    .brand-wrap { display: flex; align-items: center; gap: 8px; }
    .brand-title { font-size: 16px; font-weight: 900; letter-spacing: -0.5px; } /* Smaller for mobile */
    .brand-badge { background: rgba(252, 128, 25, 0.2); color: var(--brand); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
    
    .top-actions { display: flex; align-items: center; gap: 12px; }
    .clock { font-size: 13px; font-weight: 700; color: var(--text-sub); }
    .btn-refresh { background: #374151; color: #fff; border: none; padding: 6px 12px; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
    .btn-refresh:active { transform: scale(0.95); }

    /* ── Mobile-First Swipeable Board ── */
    .board {
      display: flex;
      flex-direction: row;
      gap: 16px;
      padding: 16px;
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      /* Hide scrollbar for cleaner look */
      scrollbar-width: none; 
    }
    .board::-webkit-scrollbar { display: none; }

    .column {
      background: var(--bg-panel);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      
      /* Mobile Sizing: 85% width so they can see the next column peeking out */
      min-width: 88vw; 
      max-height: 100%;
      scroll-snap-align: center;
    }

    /* ── Tablet & PC View (The 3-Column Grid) ── */
    @media (min-width: 768px) {
      .top-bar { padding: 16px 24px; }
      .brand-title { font-size: 20px; }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        overflow-x: hidden;
      }
      .column {
        min-width: 0; /* Reset mobile width */
      }
    }

    .col-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .col-title { font-size: 16px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
    .col-count { background: #374151; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 800; }

    /* Dot indicators */
    .dot-new { color: var(--color-new); }
    .dot-prep { color: var(--color-prep); }
    .dot-ready { color: var(--color-ready); }

    /* Scrollable Order List inside the column */
    .order-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Order Card ── */
    .order-card {
      background: var(--bg-card);
      border-radius: 12px;
      border-left: 4px solid var(--border);
      padding: 16px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      transition: transform 0.2s ease;
    }
    .card-new { border-left-color: var(--color-new); }
    .card-prep { border-left-color: var(--color-prep); }
    .card-ready { border-left-color: var(--color-ready); }

    .card-header { display: flex; justify-content: space-between; margin-bottom: 12px; }
    .order-id { font-size: 13px; font-weight: 800; color: var(--text-sub); }
    .order-time { font-size: 12px; font-weight: 700; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; }

    .customer-info { margin-bottom: 12px; }
    .cust-name { font-size: 16px; font-weight: 800; color: #fff; margin-bottom: 4px; }
    .cust-phone { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 6px; }

    .item-list { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 16px; }
    .item { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 6px; }
    .item:last-child { margin-bottom: 0; }
    .item-qty { font-weight: 900; color: var(--brand); margin-right: 8px; }
    .item-name { flex: 1; font-weight: 600; }

    /* Buttons */
    .btn-action {
      width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 14px; font-weight: 800;
      cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-accept { background: var(--color-new); color: #fff; }
    .btn-accept:active { background: #dc2626; transform: scale(0.98); }
    
    .btn-dispatch { background: var(--color-prep); color: #000; }
    .btn-dispatch:active { background: #ca8a04; transform: scale(0.98); }

    .btn-deliver { background: var(--color-ready); color: #fff; }
    .btn-deliver:active { background: #059669; transform: scale(0.98); }

  </style>
</head>
<body>

  <div class="top-bar">
    <div class="brand-wrap">
      <div class="brand-title">Ruby's Swader Prantik</div>
      <div class="brand-badge">KDS</div>
    </div>
    <div class="top-actions">
      <div class="clock" id="live-clock">12:00 PM</div>
      <button class="btn-refresh" onclick="fetchOrders()"><i class="fa-solid fa-rotate-right"></i></button>
    </div>
  </div>

  <div class="board">
    
    <div class="column">
      <div class="col-header">
        <div class="col-title"><i class="fa-solid fa-circle dot-new"></i> New Orders</div>
        <div class="col-count" id="count-new">0</div>
      </div>
      <div class="order-list" id="list-new">
        </div>
    </div>

    <div class="column">
      <div class="col-header">
        <div class="col-title"><i class="fa-solid fa-fire dot-prep"></i> Preparing</div>
        <div class="col-count" id="count-prep">0</div>
      </div>
      <div class="order-list" id="list-prep">
        </div>
    </div>

    <div class="column">
      <div class="col-header">
        <div class="col-title"><i class="fa-solid fa-check-circle dot-ready"></i> Ready / Out</div>
        <div class="col-count" id="count-ready">0</div>
      </div>
      <div class="order-list" id="list-ready">
        </div>
    </div>

  </div>

  <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

  <script>
    // ── Update Live Clock ──
    setInterval(() => {
      document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
    }, 1000);

    let previousOrderCount = 0;

    // ── 1. Fetch Orders from Backend ──
    async function fetchOrders() {
      const token = localStorage.getItem('nearbite_token');
      if (!token) {
        alert("Admin must be logged in!");
        window.location.href = 'login.html';
        return;
      }

      try {
        const response = await fetch('https://eatswada.onrender.com/api/orders/all', {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) throw new Error("Need to create Admin Route on backend!");

        const result = await response.json();
        if (result.success) renderOrders(result.data);

      } catch (error) {
        console.log("Waiting for backend route. Loading mock layout for preview...");
        renderOrders([
          { _id: "ORD-9821", status: "confirmed", deliveryAddress: { receiverName: "Rahul Das", receiverPhone: "9876543210" }, items: [{quantity: 1, name: "Chicken Biryani"}, {quantity: 2, name: "Soft Drink"}], createdAt: new Date() },
          { _id: "ORD-9820", status: "preparing", deliveryAddress: { receiverName: "Amit Sen", receiverPhone: "8877665544" }, items: [{quantity: 4, name: "Luchi"}, {quantity: 1, name: "Dhokar Dalna"}], createdAt: new Date(Date.now() - 600000) }
        ]);
      }
    }

    // ── 2. Render Orders into Columns ──
    function renderOrders(orders) {
      const listNew = document.getElementById('list-new');
      const listPrep = document.getElementById('list-prep');
      const listReady = document.getElementById('list-ready');

      listNew.innerHTML = ''; listPrep.innerHTML = ''; listReady.innerHTML = '';
      let cNew = 0, cPrep = 0, cReady = 0;

      orders.forEach(order => {
        const timeStr = new Date(order.createdAt).toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit'});
        
        const itemsHtml = order.items.map(i => `
          <div class="item">
            <span class="item-name"><span class="item-qty">${i.quantity}x</span> ${i.name}</span>
          </div>
        `).join('');

        const name = order.deliveryAddress?.receiverName || order.user?.name || "Customer";
        const phone = order.deliveryAddress?.receiverPhone || order.user?.phone || "No Number";
        const idShort = String(order._id).slice(-6).toUpperCase();

        let cardHtml = `
          <div class="card-header">
            <span class="order-id">#${idShort}</span>
            <span class="order-time">${timeStr}</span>
          </div>
          <div class="customer-info">
            <div class="cust-name">${name}</div>
            <div class="cust-phone"><i class="fa-solid fa-phone"></i> ${phone}</div>
          </div>
          <div class="item-list">${itemsHtml}</div>
        `;

        if (order.status === 'confirmed' || order.status === 'placed' || order.status === 'pending') {
          cNew++;
          listNew.innerHTML += `
            <div class="order-card card-new">
              ${cardHtml}
              <button class="btn-action btn-accept" onclick="updateStatus('${order._id}', 'preparing')">
                <i class="fa-solid fa-fire"></i> Accept & Cook
              </button>
            </div>`;
        } 
        else if (order.status === 'preparing') {
          cPrep++;
          listPrep.innerHTML += `
            <div class="order-card card-prep">
              ${cardHtml}
              <button class="btn-action btn-dispatch" onclick="updateStatus('${order._id}', 'out_for_delivery')">
                <i class="fa-solid fa-motorcycle"></i> Mark Dispatched
              </button>
            </div>`;
        } 
        else if (order.status === 'out_for_delivery') {
          cReady++;
          listReady.innerHTML += `
            <div class="order-card card-ready">
              ${cardHtml}
              <button class="btn-action btn-deliver" onclick="updateStatus('${order._id}', 'delivered')">
                <i class="fa-solid fa-check-double"></i> Mark Delivered
              </button>
            </div>`;
        }
      });

      document.getElementById('count-new').innerText = cNew;
      document.getElementById('count-prep').innerText = cPrep;
      document.getElementById('count-ready').innerText = cReady;

      if (cNew > previousOrderCount) {
        document.getElementById('alert-sound').play().catch(e => console.log("Audio blocked"));
      }
      previousOrderCount = cNew;
    }

    // ── 3. Update Status API Call ──
    async function updateStatus(orderId, newStatus) {
      const token = localStorage.getItem('nearbite_token');
      try {
        const response = await fetch(`https://eatswada.onrender.com/api/orders/${orderId}/status`, {
          method: 'PUT',
          headers: { 
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}` 
          },
          body: JSON.stringify({ status: newStatus })
        });

        if (response.ok) {
          fetchOrders(); 
        } else {
          alert("Connected to Mock Data! Build the backend route to make buttons live.");
          fetchOrders(); 
        }
      } catch (err) {
        console.error(err);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      fetchOrders();
      setInterval(fetchOrders, 10000);
    });
  </script>
</body>
</html>
