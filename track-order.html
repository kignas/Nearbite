<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Live Tracking – EatSwada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --brand:   #FC8019;
      --brand-light: #fff4ea;
      --text-1:  #111827;
      --text-2:  #4b5563;
      --text-3:  #9ca3af;
      --bg:      #f9fafb;
      --border:  #f3f4f6;
      --ease:    cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      -webkit-tap-highlight-color: transparent;
      margin: 0; 
      overflow-x: hidden;
    }

    .tap { cursor: pointer; transition: transform 0.15s var(--ease); }
    .tap:active { transform: scale(0.95); }

    /* ════════════════════════════════════════════
       ANIMATED BRAND HERO (REPLACES MAP)
    ════════════════════════════════════════════ */
    .tracker-hero {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 48vh; 
      background: linear-gradient(135deg, #FF9533 0%, #E86A04 100%);
      display: flex; align-items: center; justify-content: center;
      z-index: 1; overflow: hidden;
    }

    /* Radar Pulse Animation */
    .pulse-ring {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.25);
      animation: radar 3s linear infinite;
    }
    .ring-1 { width: 120px; height: 120px; animation-delay: 0s; }
    .ring-2 { width: 120px; height: 120px; animation-delay: 1s; }
    .ring-3 { width: 120px; height: 120px; animation-delay: 2s; }

    @keyframes radar {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(3.5); opacity: 0; }
    }

    .hero-icon {
      position: relative; z-index: 2;
      width: 76px; height: 76px;
      background: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: var(--brand);
      box-shadow: 0 8px 24px rgba(232, 106, 4, 0.4);
    }

    /* Floating Back Button */
    .floating-back {
      position: fixed;
      top: 20px; left: 20px;
      width: 44px; height: 44px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      z-index: 100; border: 1.5px solid rgba(255, 255, 255, 0.3);
      font-size: 16px; color: #fff;
    }

    /* ════════════════════════════════════════════
       BOTTOM TRACKING SHEET
    ════════════════════════════════════════════ */
    .tracking-sheet {
      position: relative;
      margin-top: 40vh; /* Overlaps the animated hero */
      background: #fff;
      min-height: 60vh;
      border-radius: 32px 32px 0 0;
      z-index: 10;
      padding: 32px 24px;
      box-shadow: 0 -8px 24px rgba(0,0,0,0.08);
    }

    .sheet-handle {
      position: absolute; top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 40px; height: 5px;
      background: #e5e7eb; border-radius: 10px;
    }

    .eta-header { text-align: center; margin-bottom: 28px; }
    .eta-title { font-size: 13px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .eta-time { font-size: 32px; font-weight: 900; color: #000; letter-spacing: -1px; }
    .eta-time span { font-size: 16px; font-weight: 700; color: var(--text-2); letter-spacing: 0; }

    /* ════════════════════════════════════════════
       PREMIUM VERTICAL TIMELINE
    ════════════════════════════════════════════ */
    .timeline { position: relative; padding-left: 20px; margin-bottom: 32px; }
    
    .timeline::before {
      content: ''; position: absolute; top: 8px; bottom: 30px; left: 24px;
      width: 2px; background: var(--border); z-index: 1;
    }

    .step { position: relative; margin-bottom: 24px; z-index: 2; display: flex; align-items: flex-start; gap: 16px; }
    .step:last-child { margin-bottom: 0; }

    .step-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #cbd5e1; margin-top: 6px; flex-shrink: 0;
      box-shadow: 0 0 0 4px #fff;
    }

    .step.active .step-dot {
      background: var(--brand);
      box-shadow: 0 0 0 4px var(--brand-light);
      position: relative;
    }
    .step.active .step-dot::after {
      content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
      border-radius: 50%; border: 2px solid var(--brand);
      animation: pulse 1.5s infinite; opacity: 0;
    }
    @keyframes pulse {
      0% { transform: scale(0.6); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .step-text h4 { font-size: 15px; font-weight: 800; color: var(--text-1); margin-bottom: 2px; }
    .step-text p { font-size: 12px; color: var(--text-3); font-weight: 500; }
    
    .step.passed .step-dot { background: var(--brand); }
    .step.passed .step-text h4 { color: var(--text-2); }

    /* ════════════════════════════════════════════
       RIDER CARD
    ════════════════════════════════════════════ */
    .rider-card {
      background: #fafafa; border: 1px solid var(--border);
      border-radius: 20px; padding: 16px;
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 24px;
    }

    .rider-left { display: flex; align-items: center; gap: 12px; }
    .rider-avatar {
      width: 48px; height: 48px; border-radius: 50%; background: #e5e7eb;
      display: flex; align-items: center; justify-content: center; overflow: hidden;
    }
    .rider-avatar i { font-size: 24px; color: #9ca3af; margin-top: 8px; }
    
    .rider-info h3 { font-size: 15px; font-weight: 800; color: #000; margin-bottom: 4px; }
    .rider-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text-2); }
    .rider-rating { background: #fff; padding: 2px 6px; border-radius: 6px; border: 1px solid #e5e7eb; display: flex; align-items: center; gap: 4px; color: #111; }
    .rider-rating i { color: #f59e0b; font-size: 9px; }

    .btn-call {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--brand-light); color: var(--brand);
      border: none; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ════════════════════════════════════════════
       ORDER SUMMARY
    ════════════════════════════════════════════ */
    .order-summary {
      border-top: 1px dashed #e5e7eb; padding-top: 24px;
    }
    .summary-res { font-size: 14px; font-weight: 800; color: #000; margin-bottom: 6px; }
    .summary-items { font-size: 12px; color: var(--text-2); line-height: 1.5; margin-bottom: 16px; }
    
    .summary-total {
      display: flex; justify-content: space-between; align-items: center;
      background: #f8fafc; padding: 12px 16px; border-radius: 12px;
    }
    .total-label { font-size: 12px; font-weight: 700; color: var(--text-3); text-transform: uppercase; }
    .total-price { font-size: 16px; font-weight: 900; color: #000; }

  </style>
</head>
<body>

  <div class="tracker-hero">
    <div class="pulse-ring ring-1"></div>
    <div class="pulse-ring ring-2"></div>
    <div class="pulse-ring ring-3"></div>
    <div class="hero-icon"><i class="fa-solid fa-motorcycle"></i></div>
  </div>

  <button class="floating-back tap" onclick="history.back()">
    <i class="fa-solid fa-arrow-left"></i>
  </button>

  <div class="tracking-sheet">
    <div class="sheet-handle"></div>

    <div class="eta-header">
      <div class="eta-title">Estimated Arrival</div>
      <div class="eta-time">24 <span>mins</span></div>
    </div>

    <div class="timeline">
      <div class="step passed">
        <div class="step-dot"></div>
        <div class="step-text">
          <h4>Order Confirmed</h4>
          <p>Restaurant accepted your order</p>
        </div>
      </div>
      
      <div class="step active">
        <div class="step-dot"></div>
        <div class="step-text">
          <h4>Food is being prepared</h4>
          <p>Cooking at EatSwada Kitchen</p>
        </div>
      </div>

      <div class="step">
        <div class="step-dot"></div>
        <div class="step-text">
          <h4>Out for Delivery</h4>
          <p>Rider is picking up your food</p>
        </div>
      </div>
    </div>

    <div class="rider-card">
      <div class="rider-left">
        <div class="rider-avatar"><i class="fa-solid fa-motorcycle"></i></div>
        <div class="rider-info">
          <h3>Raju Delivery</h3>
          <div class="rider-meta">
            <div class="rider-rating"><i class="fa-solid fa-star"></i> 4.8</div>
            <span>•</span>
            <span>Delivery Partner</span>
          </div>
        </div>
      </div>
      <button class="btn-call tap" onclick="window.location.href='tel:+910000000000'">
        <i class="fa-solid fa-phone"></i>
      </button>
    </div>

    <div class="order-summary">
      <div class="summary-res">Order #NB-88492</div>
      <div class="summary-items">1x Veg Momos, 2x Schezwan Sauce</div>
      <div class="summary-total">
        <span class="total-label">Total Paid Online</span>
        <span class="total-price">₹175</span>
      </div>
    </div>

  </div>

</body>
</html>
