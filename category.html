<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Category – Nearbite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white pb-20">

<!-- ── Sticky Header ── -->
<div class="sticky top-0 bg-white z-50 px-4 py-4 flex justify-between items-center border-b border-gray-100 shadow-sm">
  <div class="flex items-center gap-3">
    <button onclick="history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 active:bg-gray-200">
      <i class="fa-solid fa-arrow-left text-gray-800 text-sm"></i>
    </button>
    <div>
      <h1 id="category-title" class="text-[17px] font-black text-gray-900 leading-tight">Category</h1>
      <p class="text-[10px] font-semibold text-gray-400 uppercase tracking-widest">Restaurants near you</p>
    </div>
  </div>
  <button onclick="window.location.href='search.html'" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100">
    <i class="fa-solid fa-magnifying-glass text-gray-700 text-sm"></i>
  </button>
</div>

<!-- ── Filter Bar ── -->
<div class="flex overflow-x-auto gap-2 px-4 py-3 no-scrollbar border-b border-gray-50 bg-gray-50/60">
  <button class="filter-pill">
    <i class="fa-solid fa-sliders mr-1.5 text-[10px]"></i> Filter
  </button>
  <button onclick="toggleCategorySort()" id="sort-cat-btn" class="filter-pill">
    Sort By <i class="fa-solid fa-chevron-down ml-1 text-[9px]"></i>
  </button>
  <button onclick="toggleCategoryRating()" id="rating-cat-btn" class="filter-pill">Ratings 4.0+</button>
  <button onclick="toggleCategoryVeg()" id="veg-cat-btn" class="filter-pill">Pure Veg</button>
</div>

<!-- ── Results ── -->
<div id="results-list" class="px-5 pt-5 pb-4">
  <!-- Skeleton -->
  <div id="cat-skeleton" class="space-y-6">
    <div class="flex gap-4">
      <div class="skeleton w-28 h-28 rounded-2xl flex-shrink-0"></div>
      <div class="flex-1 space-y-2 pt-1">
        <div class="skeleton h-5 w-3/4 rounded"></div>
        <div class="skeleton h-3 w-1/2 rounded"></div>
        <div class="skeleton h-3 w-full rounded"></div>
      </div>
    </div>
    <div class="flex gap-4">
      <div class="skeleton w-28 h-28 rounded-2xl flex-shrink-0"></div>
      <div class="flex-1 space-y-2 pt-1">
        <div class="skeleton h-5 w-2/3 rounded"></div>
        <div class="skeleton h-3 w-1/2 rounded"></div>
        <div class="skeleton h-3 w-full rounded"></div>
      </div>
    </div>
  </div>
  <div id="cat-results" class="hidden"></div>
</div>

<!-- ── Bottom Navigation ── -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item" style="color:#FC8019">
    <div class="nav-food-circle">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-5.87-11.31-7.95-15.03-3.89V21h15.03v-6.01z"/></svg>
    </div>
    <span style="color:#FC8019">Food</span>
  </a>
  <a href="under99.html" class="nav-item" style="color:#94a3b8">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
    <spanstyle="color:#FC8019">99 store</span>
  </a>
  <a href="orders.html" class="nav-item" style="color:#94a3b8">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    <span>Orders</span>
    <span class="nav-new-badge">NEW</span>
  </a>
</nav>

<script src="home.js"></script>
<script>
  let catSortRating = false, catRatingFilter = false, catVegOnly = false;
  let baseCategory = '';

  document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    baseCategory = params.get('type') || '';
    const titleEl = document.getElementById('category-title');
    if (baseCategory) titleEl.innerText = baseCategory;
    setTimeout(renderCategory, 400);
  });

  function renderCategory() {
    const skeleton = document.getElementById('cat-skeleton');
    const container = document.getElementById('cat-results');
    if (!container) return;

    const term = baseCategory.toLowerCase();
    let filtered = restaurants.filter(res => {
      const nameMatch  = res.name.toLowerCase().includes(term);
      const cuisineMatch = res.cuisine && res.cuisine.toLowerCase().includes(term);
      const menuMatch  = res.menu.some(item => item.name.toLowerCase().includes(term));
      const vegMatch   = !catVegOnly || res.menu.every(item => item.isVeg);
      const ratingMatch = !catRatingFilter || parseFloat(res.rating) >= 4.0;
      return (nameMatch || cuisineMatch || menuMatch) && vegMatch && ratingMatch;
    });

    if (catSortRating) {
      filtered.sort((a, b) => parseFloat(b.rating) - parseFloat(a.rating));
    }

    if (skeleton) skeleton.style.display = 'none';
    container.classList.remove('hidden');

    if (filtered.length === 0) {
      container.innerHTML = `
        <div class="text-center py-20 px-8">
          <div class="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-5">
            <i class="fa-solid fa-utensils text-gray-200 text-4xl"></i>
          </div>
          <h2 class="text-[18px] font-black text-gray-900 mb-2">No restaurants found</h2>
          <p class="text-[13px] text-gray-500 font-medium leading-relaxed">
            We couldn't find any places serving "${baseCategory}" nearby.
          </p>
          <button onclick="history.back()"
                  class="mt-8 bg-orange-500 text-white font-black text-[13px] px-8 py-3 rounded-2xl shadow-md shadow-orange-200 active:scale-95 transition-transform">
            Go Back
          </button>
        </div>`;
      return;
    }

    container.innerHTML = `
      <p class="text-[11px] font-black text-gray-400 uppercase tracking-widest mb-5">
        ${filtered.length} restaurant${filtered.length !== 1 ? 's' : ''} found
      </p>
      ${filtered.map(res => `
        <a href="restaurant.html?id=${res.id}"
           class="flex gap-4 mb-7 active:scale-[0.98] transition-transform block">
          <div class="relative w-28 h-28 flex-shrink-0">
            <img src="${res.image}" alt="${res.name}"
                 class="w-full h-full rounded-2xl object-cover shadow-sm"
                 onerror="this.src='https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=200&auto=format&fit=crop&q=80'">
            ${res.offer ? `
              <div class="absolute bottom-0 left-0 right-0 bg-black/60 backdrop-blur-sm text-white text-[8px] font-black text-center py-1 rounded-b-2xl px-1 leading-tight">
                ${res.offer}
              </div>` : ''}
          </div>
          <div class="flex-1 pt-1 min-w-0">
            <div class="flex justify-between items-start gap-2 mb-1">
              <h3 class="font-black text-[16px] text-gray-900 leading-tight truncate">${res.name}</h3>
              <button class="flex-shrink-0"><i class="fa-regular fa-heart text-gray-300 text-sm"></i></button>
            </div>
            <div class="flex items-center gap-1.5 mb-1">
              <div class="flex items-center gap-0.5 bg-green-600 text-white text-[10px] font-black px-1.5 py-0.5 rounded-md">
                <i class="fa-solid fa-star text-[8px]"></i> ${res.rating}
              </div>
              <span class="text-[12px] font-bold text-gray-700">· ${res.time}</span>
            </div>
            <p class="text-[12px] text-gray-400 font-medium truncate">${res.cuisine}</p>
            <p class="text-[11px] text-gray-400 mt-0.5 flex items-center gap-1">
              <i class="fa-solid fa-location-dot text-orange-400 text-[9px]"></i>
              Maynaguri · ${res.distance}
            </p>
          </div>
        </a>`).join('')}`;
  }

  function toggleCategorySort() {
    catSortRating = !catSortRating;
    document.getElementById('sort-cat-btn').classList.toggle('active', catSortRating);
    renderCategory();
  }
  function toggleCategoryRating() {
    catRatingFilter = !catRatingFilter;
    document.getElementById('rating-cat-btn').classList.toggle('active', catRatingFilter);
    renderCategory();
  }
  function toggleCategoryVeg() {
    catVegOnly = !catVegOnly;
    document.getElementById('veg-cat-btn').classList.toggle('active', catVegOnly);
    renderCategory();
  }
</script>
</body>
</html>
