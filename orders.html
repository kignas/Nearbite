<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Orders – Nearbite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 pb-24">

<!-- ── Sticky Header ── -->
<header class="sticky top-0 bg-white z-40 px-5 py-4 border-b border-gray-100 shadow-sm flex items-center gap-4">
  <button onclick="window.history.back()" class="w-9 h-9 flex items-center justify-center rounded-full bg-gray-100 active:bg-gray-200">
    <i class="fa-solid fa-arrow-left text-gray-700 text-sm"></i>
  </button>
  <h1 class="text-[18px] font-black text-gray-900">My Orders</h1>
</header>

<!-- ── Page Content ── -->
<div class="px-4 pt-5">

  <!-- Search past orders -->
  <div class="relative mb-5">
    <input type="text" placeholder="Search your past orders..."
           class="w-full bg-white border border-gray-200 rounded-2xl py-3.5 pl-11 pr-4 text-[13px] font-medium text-gray-700 outline-none focus:border-orange-400 transition-colors placeholder-gray-400">
    <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-gray-400 text-sm"></i>
  </div>

  <!-- Cart items (items in bag, not yet ordered) -->
  <div id="cart-section"></div>

  <!-- Empty State -->
  <div id="empty-orders" class="hidden">
    <div class="bg-white rounded-[24px] p-8 shadow-sm border border-gray-100 text-center">
      <div class="w-24 h-24 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-5">
        <i class="fa-solid fa-bag-shopping text-orange-300 text-4xl"></i>
      </div>
      <h4 class="text-[17px] font-black text-gray-900 mb-2">No orders yet</h4>
      <p class="text-[13px] text-gray-500 font-medium leading-relaxed mb-7">
        Your order history will appear here<br>after you place your first order
      </p>
      <button onclick="window.location.href='index.html'"
              class="bg-orange-500 text-white font-black text-[13px] px-8 py-3.5 rounded-2xl shadow-md shadow-orange-100 active:scale-95 transition-transform">
        Explore Nearbite
      </button>
    </div>
  </div>

  <!-- Track order progress (demo shown when cart has items) -->
  <div id="track-section" class="hidden mb-5">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-[11px] font-black text-orange-500 uppercase tracking-widest">Current Order</h2>
      <span class="w-2 h-2 bg-orange-500 rounded-full animate-pulse"></span>
    </div>
    <div class="bg-white rounded-[24px] p-5 shadow-sm border border-orange-100">
      <div class="flex justify-between items-start mb-5">
        <div>
          <h3 class="font-black text-[16px] text-gray-900">Items in your bag</h3>
          <p id="track-restaurant" class="text-[12px] text-gray-400 font-medium mt-0.5"></p>
        </div>
        <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-200 animate-pulse">
          <i class="fa-solid fa-bag-shopping text-white text-sm"></i>
        </div>
      </div>

      <!-- Progress bar -->
      <div class="space-y-2 mb-5">
        <div class="relative h-2 w-full bg-gray-100 rounded-full overflow-hidden">
          <div class="absolute top-0 left-0 h-full w-1/3 bg-orange-500 rounded-full"></div>
        </div>
        <div class="flex justify-between text-[9px] font-black uppercase tracking-widest">
          <span class="text-orange-500">Added</span>
          <span class="text-gray-300">Confirmed</span>
          <span class="text-gray-300">Delivered</span>
        </div>
      </div>

      <button onclick="window.location.href='cart.html'"
              class="w-full bg-orange-500 text-white py-3.5 rounded-2xl font-black text-[14px] shadow-md shadow-orange-100 active:scale-[0.98] transition-transform">
        View Cart &amp; Checkout
      </button>
    </div>
  </div>

</div>

<!-- ══════════════════════════════════════════
     BOTTOM NAVIGATION
══════════════════════════════════════════ -->
<nav class="bottom-nav">

<nav class="bottom-nav">
  <a href="index.html" class="nav-item" style="color:#FC8019">
    <div class="nav-food-circle">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-5.87-11.31-7.95-15.03-3.89V21h15.03v-6.01z"/></svg>
    </div>
    <span style="color:#FC8019">Food</span>
  </a>
  <a href="under99.html" class="nav-item" style="color:#94a3b8">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
    <spanstyle="color:#FC8019">99 store</span>
  </a>
  <a href="orders.html" class="nav-item" style="color:#94a3b8">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    <span>Orders</span>
    <span class="nav-new-badge">NEW</span>
  </a>
</nav>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const savedCart   = JSON.parse(localStorage.getItem('nearbite_cart')) || {};
  const totalItems  = Object.values(savedCart).reduce((s, i) => s + i.quantity, 0);
  const totalPrice  = Object.values(savedCart).reduce((s, i) => s + i.quantity * i.price, 0);
  const trackSection = document.getElementById('track-section');
  const emptySection = document.getElementById('empty-orders');

  if (totalItems > 0) {
    trackSection.classList.remove('hidden');
    const resId  = Object.values(savedCart)[0].resId;
    const resData = JSON.parse(localStorage.getItem('restaurantData')) || [];
    const res = resData.find(r => r.id === resId);
    const trackRes = document.getElementById('track-restaurant');
    if (trackRes) {
      trackRes.innerText = (res ? res.name : 'Nearbite') + ' · ' + totalItems + ' item' + (totalItems > 1 ? 's' : '') + ' · ₹' + totalPrice;
    }
    emptySection.classList.add('hidden');
  } else {
    emptySection.classList.remove('hidden');
    trackSection.classList.add('hidden');
  }
});
</script>
</body>
</html>
