<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>My Orders – Nearbite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    /* ============================================================
       ORDERS PAGE — Premium Scoped Styles
       ============================================================ */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f4f6;
      margin: 0;
      padding-bottom: calc(88px + env(safe-area-inset-bottom));
      -webkit-tap-highlight-color: transparent;
    }

    .tap { transition: transform 0.15s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.15s ease; cursor: pointer; }
    .tap:active { transform: scale(0.96); opacity: 0.9; }

    /* Sticky Header */
    .orders-header {
      position: sticky; top: 0; z-index: 40;
      background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06); box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
      padding: 14px 20px; display: flex; align-items: center; gap: 14px;
    }
    .header-back-btn {
      width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: #f1f1f5; border: none; color: #374151; font-size: 13px;
    }
    .orders-header h1 { font-size: 18px; font-weight: 900; color: #111827; letter-spacing: -0.3px; margin: 0; }

    .orders-content { padding: 20px 16px 0; }

    /* Empty State */
    #empty-orders { display: none; }
    .empty-card { background: #ffffff; border-radius: 24px; padding: 40px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); text-align: center; }
    .empty-icon-wrap { width: 88px; height: 88px; background: #fff7ef; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .empty-icon-wrap i { font-size: 36px; color: #fbbf9a; }
    .empty-card h4 { font-size: 17px; font-weight: 900; color: #111827; margin: 0 0 8px; }
    .empty-card p { font-size: 13px; color: #6b7280; font-weight: 500; line-height: 1.65; margin: 0 0 28px; }
    
    .explore-btn {
      background: #FC8019; color: #ffffff; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 900;
      padding: 14px 32px; border-radius: 16px; border: none; letter-spacing: 0.2px;
      box-shadow: 0 6px 20px rgba(252, 128, 25, 0.32), 0 2px 6px rgba(252, 128, 25, 0.15);
    }

    /* Section Titles */
    .section-title { font-size: 14px; font-weight: 900; color: #64748B; text-transform: uppercase; letter-spacing: 1.2px; margin: 24px 0 12px 0; display: flex; align-items: center; gap: 8px; }
    .pulse-dot { width: 8px; height: 8px; background: #FC8019; border-radius: 50%; animation: pulse-anim 1.6s ease-in-out infinite; }
    @keyframes pulse-anim { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.5; } }

    /* Track/Live Card */
    .track-card { background: #ffffff; border-radius: 24px; padding: 20px; box-shadow: 0 4px 16px rgba(0,0,0,0.06); border: 1px solid #ffeedd; margin-bottom: 16px; text-decoration: none; display: block; }
    .track-card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
    .track-card-top h3 { font-size: 16px; font-weight: 900; color: #111827; margin: 0; }
    .track-restaurant-name { font-size: 12px; color: #64748B; font-weight: 600; margin-top: 4px; }
    
    .track-bag-icon { width: 42px; height: 42px; background: #FC8019; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 6px 18px rgba(252,128,25,0.4); color: #fff; font-size: 16px; animation: bag-pulse 2s infinite; }
    @keyframes bag-pulse { 0%, 100% { box-shadow: 0 6px 18px rgba(252,128,25,0.4); } 50% { box-shadow: 0 8px 24px rgba(252,128,25,0.6); } }

    /* Progress Bar */
    .progress-bar-track { height: 6px; width: 100%; background: #f0f0f4; border-radius: 999px; overflow: hidden; margin-bottom: 8px; position: relative; }
    .progress-bar-fill { position: absolute; top: 0; left: 0; height: 100%; background: linear-gradient(90deg, #FC8019, #ffaa55); border-radius: 999px; transition: width 0.5s ease; }
    .progress-labels { display: flex; justify-content: space-between; }
    .progress-labels span { font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: #d1d5db; }
    .progress-labels span.active-label { color: #FC8019; }

    .view-track-btn { width: 100%; background: #fff7ef; color: #FC8019; font-family: 'Poppins', sans-serif; font-size: 13px; font-weight: 900; padding: 12px; border-radius: 12px; border: 1px solid #ffeedd; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 6px; }

    /* Past Orders Card */
    .past-card { background: #ffffff; border-radius: 20px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); border: 1px solid #f1f5f9; margin-bottom: 12px; display: block; text-decoration: none; }
    .past-card-header { display: flex; justify-content: space-between; border-bottom: 1px dashed #e2e8f0; padding-bottom: 12px; margin-bottom: 12px; }
    .past-card-header h4 { font-size: 15px; font-weight: 900; margin: 0 0 4px; color: #111827; }
    .past-card-date { font-size: 11px; color: #9ca3af; font-weight: 600; }
    .status-badge { font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; height: fit-content; }
    .past-items { font-size: 12px; font-weight: 600; color: #4b5563; margin: 0 0 16px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .past-footer { display: flex; justify-content: space-between; align-items: center; }
    .past-total { font-size: 15px; font-weight: 900; color: #111827; }
    .reorder-btn { background: #f8fafc; color: #FC8019; border: 1px solid #e2e8f0; padding: 8px 16px; border-radius: 10px; font-size: 11px; font-weight: 800; }

    /* Skeleton Loader */
    .sk { background: linear-gradient(90deg, #ececef 25%, #f6f6f9 50%, #ececef 75%); background-size: 1200px 100%; animation: shimmer 1.5s infinite linear; border-radius: 10px; }
    @keyframes shimmer { 0% { background-position: -600px 0; } 100% { background-position: 600px 0; } }

    /* Bottom Nav */
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 68px; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(0,0,0,0.05); display: flex; align-items: stretch; box-shadow: 0 -4px 24px rgba(0,0,0,0.06); z-index: 100; padding-bottom: env(safe-area-inset-bottom); }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; font-size: 10px; font-weight: 700; color: #94a3b8; text-decoration: none; position: relative; }
    .nav-item svg { width: 24px; height: 24px; }
    .nav-food-circle { width: 22px; height: 22px; }
    .nav-new-badge { position: absolute; top: 6px; right: calc(50% - 22px); background: #FC8019; color: #fff; font-size: 7px; font-weight: 900; padding: 1px 5px; border-radius: 999px; }
  </style>
</head>

<body>

<header class="orders-header">
  <button onclick="window.history.back()" class="header-back-btn tap" aria-label="Go back">
    <i class="fa-solid fa-arrow-left"></i>
  </button>
  <h1>My Orders</h1>
</header>

<div class="orders-content">

  <div id="loading-state">
    <div class="sk" style="height: 180px; border-radius: 24px; margin-bottom: 16px;"></div>
    <div class="sk" style="height: 120px; border-radius: 20px; margin-bottom: 12px;"></div>
    <div class="sk" style="height: 120px; border-radius: 20px;"></div>
  </div>

  <div id="live-orders-container"></div>

  <div id="past-orders-container"></div>

  <div id="empty-orders">
    <div class="empty-card tap">
      <div class="empty-icon-wrap"><i class="fa-solid fa-file-invoice"></i></div>
      <h4 id="empty-title">No orders found</h4>
      <p id="empty-desc">Looks like you haven't placed<br>any orders yet.</p>
      <button id="empty-btn" class="explore-btn tap">Explore Restaurants</button>
    </div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="index.html" class="nav-item" style="color:#94a3b8;">
    <div class="nav-food-circle">
      <svg fill="currentColor" viewBox="0 0 24 24"><path d="M18.06 22.99h1.66c.84 0 1.53-.64 1.63-1.46L23 5.05h-5V1h-1.97v4.05h-4.97l.3 2.34c1.71.47 3.31 1.32 4.27 2.26 1.44 1.42 2.43 2.89 2.43 5.29v8.05zM1 21.99V21h15.03v.99c0 .55-.45 1-1.01 1H2.01c-.56 0-1.01-.45-1.01-1zm15.03-7c0-5.87-11.31-7.95-15.03-3.89V21h15.03v-6.01z"/></svg>
    </div>
    <span>Food</span>
  </a>
  <a href="under99.html" class="nav-item" style="color:#94a3b8;">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
    <span>99 store</span>
  </a>
  <a href="orders.html" class="nav-item" style="color:#FC8019; position:relative;">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
    <span>Orders</span>
    <span class="nav-new-badge">NEW</span>
  </a>
</nav>

<script>
document.addEventListener('DOMContentLoaded', () => {
  // Grab the token, and ensure it isn't the literal word "undefined"
  let token = localStorage.getItem('nearbite_token') || localStorage.getItem('token');
  if (token === 'undefined' || token === 'null') token = null;

  const loader = document.getElementById('loading-state');
  const liveContainer = document.getElementById('live-orders-container');
  const pastContainer = document.getElementById('past-orders-container');
  const emptyState = document.getElementById('empty-orders');

  const requireLogin = (reason) => {
    loader.style.display = 'none';
    emptyState.style.display = 'block';
    document.getElementById('empty-title').innerText = "Please log in";
    document.getElementById('empty-desc').innerHTML = `Log in to view your past orders.<br><br><span style="color:#ef4444; font-size:11px; font-weight:bold;">BACKEND SAYS: ${reason}</span>`;
    const btn = document.getElementById('empty-btn');
    btn.innerText = "LOGIN NOW";
    btn.onclick = () => {
        localStorage.clear(); // Nuke everything before trying again
        window.location.href = 'login.html';
    };
  };

  if (!token) return requireLogin("TOKEN_IS_EMPTY_OR_UNDEFINED");

  // 🚨 THE FIX: I actually created the fetchOrders function here! 🚨
  async function fetchOrders() {
    try {
      const response = await fetch('https://eatswada.onrender.com/api/orders', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (response.status === 401) {
        const errorData = await response.json();
        return requireLogin(errorData.message.toUpperCase());
      }

      if (response.status === 404) {
          return requireLogin("API_ROUTE_NOT_FOUND");
      }

      const result = await response.json();
      
      // Only hide loader on the very first load
      if (loader) loader.style.display = 'none';

      if (response.ok && result.success && result.data.length > 0) {
        const allOrders = result.data;
        const liveStatuses = ['pending', 'preparing', 'out_for_delivery'];
        const liveOrders = allOrders.filter(o => liveStatuses.includes(o.status.toLowerCase()));
        const pastOrders = allOrders.filter(o => !liveStatuses.includes(o.status.toLowerCase()));

        if (liveOrders.length > 0) {
          let liveHTML = `<div class="section-title">Live Orders <span class="pulse-dot"></span></div>`;
          liveHTML += liveOrders.map(order => {
            let width = '10%'; let active1 = 'active-label', active2 = '', active3 = '';
            if (order.status.toLowerCase() === 'preparing') { width = '50%'; active2 = 'active-label'; }
            if (order.status.toLowerCase() === 'out_for_delivery') { width = '85%'; active2 = 'active-label'; active3 = 'active-label'; }
            return `
              <a href="track-order.html?id=${order._id}" class="track-card tap">
                <div class="track-card-top">
                  <div>
                    <h3>${order.status === 'out_for_delivery' ? 'Arriving Soon!' : 'Preparing Order'}</h3>
                    <p class="track-restaurant-name">${order.restaurantName || "EatSwada Partner"} • ₹${order.total}</p>
                  </div>
                  <div class="track-bag-icon"><i class="fa-solid fa-motorcycle"></i></div>
                </div>
                <div class="progress-bar-track"><div class="progress-bar-fill" style="width: ${width};"></div></div>
                <div class="progress-labels"><span class="${active1}">Received</span><span class="${active2}">Preparing</span><span class="${active3}">On the way</span></div>
                <div class="view-track-btn">Track Order <i class="fa-solid fa-arrow-right"></i></div>
              </a>
            `;
          }).join('');
          liveContainer.innerHTML = liveHTML;
        } else {
          liveContainer.innerHTML = '';
        }

        if (pastOrders.length > 0) {
          let pastHTML = `<div class="section-title" style="margin-top:${liveOrders.length > 0 ? '32px' : '16px'}">Past Orders</div>`;
          pastHTML += pastOrders.map(order => {
            const dateStr = new Date(order.createdAt).toLocaleString('en-IN', { month: 'short', day: 'numeric', hour: '2-digit', minute:'2-digit' });
            const itemsStr = order.items.map(i => `${i.quantity}x ${i.name}`).join(', ');
            let statusColor = '#FC8019'; if (order.status === 'delivered') statusColor = '#1ba672'; if (order.status === 'cancelled') statusColor = '#e63946';
            return `
              <a href="track-order.html?id=${order._id}" class="past-card tap">
                <div class="past-card-header">
                  <div><h4>${order.restaurantName || "EatSwada Partner"}</h4><span class="past-card-date">${dateStr}</span></div>
                  <span class="status-badge" style="color:${statusColor}; background:${statusColor}15;">${order.status}</span>
                </div>
                <p class="past-items">${itemsStr}</p>
                <div class="past-footer"><span class="past-total">₹${order.total}</span><span class="reorder-btn tap">Details</span></div>
              </a>
            `;
          }).join('');
          pastContainer.innerHTML = pastHTML;
        } else {
          pastContainer.innerHTML = '';
        }
      } else {
        emptyState.style.display = 'block';
        document.getElementById('empty-title').innerText = "No orders found";
        document.getElementById('empty-desc').innerText = "Looks like you haven't placed any orders yet.";
        const btn = document.getElementById('empty-btn');
        btn.innerText = "Explore Restaurants";
        btn.onclick = () => window.location.href = 'index.html';
      }
    } catch (error) {
      console.error(error);
      requireLogin("NETWORK_ERROR_CHECK_CONSOLE");
    }
  } // ✅ Properly closing the fetchOrders function!

  // Run immediately, then check every 10 seconds for live updates silently!
  fetchOrders(); 
  setInterval(fetchOrders, 10000); 

});
</script>
</body>
</html>
