<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Menu – Nearbite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">

  <style>
    /* ============================================================
       RESET & BASE
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:       #FC8019;
      --brand-light: #fff4ea;
      --brand-dark:  #e0700f;
      --green:       #1ba672;
      --red:         #e63946;
      --bg:          #f4f4f6;
      --card:        #ffffff;
      --text-1:      #111111;
      --text-2:      #555555;
      --text-3:      #aaaaaa;
      --border:      #f0f0f2;
      --shadow-sm:   0 1px 4px rgba(0,0,0,0.06);
      --shadow-md:   0 4px 20px rgba(0,0,0,0.08);
      --shadow-lg:   0 8px 32px rgba(0,0,0,0.13);
      --ease:        cubic-bezier(0.25, 1, 0.5, 1);
      --radius-xl:   24px;
      --radius-lg:   18px;
      --radius-md:   12px;
      --radius-sm:   8px;
    }

    body {
      background: var(--bg);
      font-family: 'Poppins', sans-serif;
      padding-bottom: 140px;
      -webkit-font-smoothing: antialiased;
    }

    /* ============================================================
       TOP BAR
    ============================================================ */
    .top-bar {
      position: sticky; top: 0; z-index: 200;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .icon-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #f3f3f5;
      border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      -webkit-tap-highlight-color: transparent;
    }
    .icon-btn:active { transform: scale(0.88); background: #eaeaed; }
    .icon-btn i { font-size: 13px; color: #333; }
    .top-actions { display: flex; gap: 10px; }

    /* ============================================================
       RESTAURANT INFO CARD
    ============================================================ */
    .res-card {
      margin: 14px 14px 0;
      background: var(--card);
      border-radius: var(--radius-xl);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(0,0,0,0.04);
    }

    .res-card-body { padding: 18px 18px 0; }

    .res-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
    }

    .res-name {
      font-size: 21px; font-weight: 900;
      color: var(--text-1); line-height: 1.2;
    }

    .res-cuisine {
      font-size: 12px; color: var(--text-3);
      font-weight: 600; margin-top: 3px;
    }

    /* Heart / favourite button */
    .heart-btn {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: 1.5px solid #f0f0f0;
      background: #fafafa;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; cursor: pointer;
      transition: transform 0.2s var(--ease), border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .heart-btn:active { transform: scale(0.85); }
    .heart-btn.loved   { border-color: #ffd6d6; background: #fff0f0; }
    .heart-btn.loved i { color: var(--red) !important; }
    .heart-btn i { font-size: 14px; color: #ccc; transition: color 0.2s; }

    /* Rating + meta row */
    .res-meta-row {
      display: flex; align-items: center;
      gap: 10px; margin-top: 12px; flex-wrap: wrap;
    }

    .rating-pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--card);
      border: 1.5px solid #e8e8e8;
      border-radius: 10px; padding: 4px 10px;
      box-shadow: var(--shadow-sm);
    }
    .rating-star    { color: var(--green); font-size: 11px; }
    .rating-num     { font-size: 13px; font-weight: 800; color: var(--text-1); }
    .rating-divider { width: 1px; height: 12px; background: #e2e2e2; }
    .rating-count   { font-size: 11px; font-weight: 600; color: var(--text-3); }
    .meta-dot       { color: #ddd; }
    .meta-chip      { font-size: 12px; font-weight: 700; color: var(--text-2); display: flex; align-items: center; gap: 5px; }
    .meta-chip i    { color: var(--brand); font-size: 11px; }

    /* Offer banner */
    .offer-strip {
      margin: 14px 0 0; padding: 11px 14px;
      background: #fff9f2; border-radius: 14px;
      border: 1.5px solid #ffe5cc;
      display: none; align-items: center; gap: 10px;
    }
    .offer-icon {
      width: 30px; height: 30px;
      background: var(--brand); border-radius: 9px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .offer-icon i  { font-size: 13px; color: #fff; }
    .offer-text    { font-size: 12px; font-weight: 800; color: #b85e00; }

    /* Delivery strip */
    .delivery-strip {
      padding: 12px 18px; margin-top: 14px;
      border-top: 1.5px dashed #f2f2f2;
      display: flex; align-items: center; gap: 14px;
    }
    .del-chip { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: #777; }
    .del-chip .orange { color: var(--brand); }
    .del-chip .blue   { color: #60a5fa; }
    .del-sep          { width: 1px; height: 14px; background: #eee; }

    /* ============================================================
       STICKY CATEGORY NAV
       Fixed position — zero layout gap when hidden
    ============================================================ */
    .cat-nav-sentinel { height: 1px; margin: 0; padding: 0; }

    .cat-nav {
      position: fixed;
      top: 62px; /* sits flush below top-bar */
      left: 0; right: 0;
      z-index: 150;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 3px 14px rgba(0,0,0,0.07);
      /* Hidden: slide up + invisible — NO layout space taken */
      transform: translateY(-110%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.3s var(--ease), opacity 0.25s ease;
    }
    .cat-nav.visible {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .cat-nav-inner {
      display: flex; align-items: center; gap: 6px;
      overflow-x: auto; padding: 10px 14px;
      scrollbar-width: none; -ms-overflow-style: none;
    }
    .cat-nav-inner::-webkit-scrollbar { display: none; }

    .cat-nav-pill {
      flex-shrink: 0;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 12px; font-weight: 700;
      color: var(--text-2);
      background: #f5f5f5;
      border: 1.5px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s var(--ease);
      -webkit-tap-highlight-color: transparent;
    }
    .cat-nav-pill:active  { transform: scale(0.93); }
    .cat-nav-pill.active  {
      background: var(--brand-light);
      border-color: var(--brand);
      color: var(--brand);
    }

    /* ============================================================
       VEG / NON-VEG FILTER  ← NEW
    ============================================================ */
    .filter-bar {
      margin: 12px 14px 0;
      display: flex; align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 10px 16px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
    }

    .filter-label {
      font-size: 13px; font-weight: 800; color: var(--text-1);
    }

    .veg-toggle-row {
      display: flex; align-items: center; gap: 10px;
    }

    /* Veg toggle chip */
    .veg-chip {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 11px; font-weight: 700;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: all 0.18s var(--ease);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .veg-chip:active { transform: scale(0.92); }

    /* Veg dot indicator */
    .veg-dot-icon {
      width: 10px; height: 10px;
      border-radius: 2px;
      border: 1.5px solid;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .veg-dot-icon::after {
      content: ''; width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    /* VEG chip colours */
    .veg-chip.veg-type   { color: var(--green); border-color: #d4edda; background: #f0faf5; }
    .veg-chip.veg-type.active   { background: var(--green); color: #fff; border-color: var(--green); }
    .veg-chip.veg-type .veg-dot-icon   { border-color: currentColor; }

    /* NON-VEG chip colours */
    .veg-chip.nonveg-type { color: var(--red); border-color: #fdd; background: #fff5f5; }
    .veg-chip.nonveg-type.active { background: var(--red); color: #fff; border-color: var(--red); }
    .veg-chip.nonveg-type .veg-dot-icon { border-color: currentColor; }

    /* ============================================================
       MENU SECTION
    ============================================================ */
    .menu-section { padding: 0 14px; margin-top: 22px; }

    .menu-cat-group { margin-bottom: 8px; }

    /* Category heading row (collapsible) */
    .menu-cat-header {
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 14px 0 10px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      border-bottom: 1px solid var(--border);
    }
    .menu-cat-title {
      font-size: 16px; font-weight: 900; color: var(--text-1);
      display: flex; align-items: center; gap: 8px;
    }
    .menu-cat-count {
      font-size: 13px; font-weight: 700; color: var(--text-3);
    }
    .menu-cat-chevron {
      font-size: 12px; color: var(--text-3);
      transition: transform 0.25s var(--ease);
    }
    .menu-cat-header.collapsed .menu-cat-chevron {
      transform: rotate(-90deg);
    }
    .menu-cat-items {
      overflow: hidden;
      transition: max-height 0.35s var(--ease), opacity 0.3s;
      max-height: 9999px; opacity: 1;
    }
    .menu-cat-items.collapsed {
      max-height: 0; opacity: 0;
    }

    /* ── Single menu item ── */
    .menu-item {
      display: flex; justify-content: space-between;
      align-items: flex-start;
      padding: 18px 0; border-bottom: 1px solid #f5f5f7;
      gap: 14px;
      animation: fadeSlideUp 0.3s ease both;
    }
    .menu-item.hidden-by-filter { display: none !important; }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .menu-item-left { flex: 1; min-width: 0; }

    /* Veg / non-veg indicator */
    .veg-dot {
      width: 14px; height: 14px;
      border-radius: 3px; border: 1.5px solid;
      display: inline-flex; align-items: center; justify-content: center;
      margin-bottom: 7px; flex-shrink: 0;
    }
    .veg-dot.veg    { border-color: var(--green); }
    .veg-dot.nonveg { border-color: var(--red);   }
    .veg-dot .dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .veg-dot.veg    .dot { background: var(--green); }
    .veg-dot.nonveg .dot { background: var(--red);   }

    /* Bestseller / Must Try tag  ← NEW */
    .item-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 2px 8px; border-radius: 4px;
      margin-bottom: 6px;
    }
    .item-tag.bestseller {
      background: #fff4e6; color: #e07000;
      border: 1px solid #ffdcb2;
    }
    .item-tag.musttry {
      background: #e8f8f1; color: #1a8a5f;
      border: 1px solid #b2e8d0;
    }
    .item-tag i { font-size: 8px; }

    .item-name  {
      font-size: 15px; font-weight: 800;
      color: var(--text-1); line-height: 1.25; margin-bottom: 3px;
    }
    .item-price {
      font-size: 15px; font-weight: 900;
      color: var(--text-1); margin-bottom: 7px;
    }
    .item-desc  {
      font-size: 12px; color: var(--text-3);
      font-weight: 500; line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Image + floating ADD button ── */
    .menu-item-img-wrap {
      position: relative; width: 110px;
      flex-shrink: 0; padding-bottom: 22px; /* space for btn + customisable */
    }
    .menu-item-img-wrap img {
      width: 110px; height: 110px;
      object-fit: cover; border-radius: var(--radius-lg);
      display: block; background: #f0f0f0;
      box-shadow: var(--shadow-sm);
    }

    /* ── Bestseller ribbon on image  ← NEW ── */
    .img-ribbon {
      position: absolute; top: 8px; left: -2px;
      background: var(--brand);
      color: #fff; font-size: 8px; font-weight: 800;
      letter-spacing: 0.4px; text-transform: uppercase;
      padding: 3px 8px 3px 6px;
      border-radius: 0 4px 4px 0;
      box-shadow: 2px 2px 6px rgba(252,128,25,0.35);
      display: flex; align-items: center; gap: 3px;
      z-index: 2;
    }
    .img-ribbon.green-ribbon {
      background: var(--green);
      box-shadow: 2px 2px 6px rgba(27,166,114,0.3);
    }
    .img-ribbon i { font-size: 7px; }

    /* ADD / stepper button */
    .item-btn-wrap {
      position: absolute; bottom: 4px;
      left: 50%; transform: translateX(-50%);
      min-width: 94px; height: 36px;
      background: var(--card);
      border: 1.5px solid #eaeaea;
      border-radius: var(--radius-md);
      box-shadow: 0 4px 18px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; z-index: 5;
    }

    .item-add-single {
      width: 100%; height: 100%;
      background: transparent; border: none;
      font-family: 'Poppins', sans-serif;
      font-size: 13px; font-weight: 800;
      color: var(--brand); letter-spacing: 0.5px;
      cursor: pointer;
      transition: background 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .item-add-single:active {
      background: var(--brand-light);
      transform: scale(0.96);
    }

    .item-stepper {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }
    .stepper-minus, .stepper-plus {
      width: 36px; height: 100%;
      background: transparent; border: none;
      font-size: 17px; font-weight: 700; color: var(--brand);
      cursor: pointer; font-family: 'Poppins', sans-serif;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .stepper-minus:active, .stepper-plus:active {
      background: var(--brand-light);
      transform: scale(0.85);
    }
    .stepper-count {
      font-size: 13px; font-weight: 900; color: var(--text-1);
      min-width: 20px; text-align: center;
      pointer-events: none;
    }

    /* Customisable text  ← NEW */
    .customisable-text {
      text-align: center; margin-top: 4px;
      font-size: 9px; font-weight: 700;
      color: var(--text-3); letter-spacing: 0.3px;
      position: absolute;
      bottom: -14px; /* sits below the btn-wrap padding area */
      left: 50%; transform: translateX(-50%);
      white-space: nowrap;
    }

    /* ============================================================
       SKELETON LOADER
    ============================================================ */
    .skel-item {
      display: flex; justify-content: space-between;
      align-items: flex-start; padding: 20px 0;
      border-bottom: 1px solid var(--border); gap: 14px;
    }
    .skel-left { flex: 1; display: flex; flex-direction: column; gap: 9px; }

    /* ============================================================
       CART BAR  (kept from style.css — just refined transitions)
    ============================================================ */
    /* style.css owns #cart-bar — we only tweak transition here */
    #cart-bar {
      transition: transform 0.38s var(--ease), opacity 0.28s ease !important;
    }

    /* ============================================================
       EMPTY FILTER STATE
    ============================================================ */
    .empty-filter-msg {
      text-align: center; padding: 48px 24px; display: none;
    }
    .empty-filter-msg i  { font-size: 40px; color: #e0e0e0; display: block; margin-bottom: 12px; }
    .empty-filter-msg p  { font-size: 14px; font-weight: 700; color: #aaa; }

  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════
       TOP BAR
  ══════════════════════════════════════════ -->
  <div class="top-bar">
    <button class="icon-btn" onclick="history.back()">
      <i class="fa-solid fa-chevron-left"></i>
    </button>
    <div class="top-actions">
      <button class="icon-btn" onclick="window.location.href='search.html'">
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>
      <button class="icon-btn" id="share-btn">
        <i class="fa-solid fa-share-nodes"></i>
      </button>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       RESTAURANT INFO CARD
  ══════════════════════════════════════════ -->
  <div class="res-card">
    <div class="res-card-body">
      <div class="res-header">
        <div>
          <h1 id="res-name" class="res-name">Loading…</h1>
          <p  id="res-cuisine" class="res-cuisine"></p>
        </div>
        <button class="heart-btn" id="heart-btn">
          <i class="fa-regular fa-heart" id="heart-icon"></i>
        </button>
      </div>

      <div class="res-meta-row">
        <div class="rating-pill">
          <i class="fa-solid fa-star rating-star"></i>
          <span id="res-rating-num" class="rating-num">–</span>
          <div class="rating-divider"></div>
          <span class="rating-count">1K+ ratings</span>
        </div>
        <span class="meta-dot">•</span>
        <span id="res-time"     class="meta-chip"><i class="fa-regular fa-clock"></i> –</span>
        <span class="meta-dot">•</span>
        <span id="res-distance" class="meta-chip"><i class="fa-solid fa-location-dot"></i> –</span>
      </div>

      <div id="res-offer-banner" class="offer-strip">
        <div class="offer-icon"><i class="fa-solid fa-tag"></i></div>
        <span id="res-offer-text" class="offer-text"></span>
      </div>
    </div>

    <div class="delivery-strip">
      <div class="del-chip">
        <i class="fa-solid fa-motorcycle orange"></i> FREE delivery above ₹199
      </div>
      <div class="del-sep"></div>
      <div class="del-chip">
        <i class="fa-regular fa-clock blue"></i> On-time delivery
      </div>
    </div>
  </div><!-- /res-card -->

  <!-- ── Sentinel: when this leaves viewport, sticky nav appears ── -->
  <div class="cat-nav-sentinel" id="cat-nav-sentinel"></div>

  <!-- ══════════════════════════════════════════
       STICKY CATEGORY NAV
  ══════════════════════════════════════════ -->
  <div class="cat-nav" id="cat-nav">
    <div class="cat-nav-inner" id="cat-nav-inner">
      <!-- pills injected by JS -->
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       VEG / NON-VEG FILTER BAR
  ══════════════════════════════════════════ -->
  <div class="filter-bar">
    <span class="filter-label">Filter</span>
    <div class="veg-toggle-row">
      <!-- VEG chip -->
      <div class="veg-chip veg-type" id="filter-veg" onclick="toggleFilter('veg')">
        <span class="veg-dot-icon"></span>
        Veg
      </div>
      <!-- NON-VEG chip -->
      <div class="veg-chip nonveg-type" id="filter-nonveg" onclick="toggleFilter('nonveg')">
        <span class="veg-dot-icon"></span>
        Non-veg
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════════
       MENU SECTION
  ══════════════════════════════════════════ -->
  <div class="menu-section">

    <!-- Skeleton (shown while loading) -->
    <div id="menu-skeleton">
      <div style="height:20px;width:130px;border-radius:8px;margin-bottom:18px;" class="skeleton"></div>
      <div class="skel-item">
        <div class="skel-left">
          <div class="skeleton" style="height:14px;width:36px;border-radius:4px;"></div>
          <div class="skeleton" style="height:16px;width:58%;"></div>
          <div class="skeleton" style="height:14px;width:42px;"></div>
          <div class="skeleton" style="height:12px;width:90%;"></div>
          <div class="skeleton" style="height:12px;width:70%;"></div>
        </div>
        <div class="skeleton" style="width:110px;height:110px;border-radius:18px;flex-shrink:0;"></div>
      </div>
      <div class="skel-item">
        <div class="skel-left">
          <div class="skeleton" style="height:14px;width:36px;border-radius:4px;"></div>
          <div class="skeleton" style="height:16px;width:50%;"></div>
          <div class="skeleton" style="height:14px;width:42px;"></div>
          <div class="skeleton" style="height:12px;width:80%;"></div>
        </div>
        <div class="skeleton" style="width:110px;height:110px;border-radius:18px;flex-shrink:0;"></div>
      </div>
      <div class="skel-item">
        <div class="skel-left">
          <div class="skeleton" style="height:14px;width:36px;border-radius:4px;"></div>
          <div class="skeleton" style="height:16px;width:65%;"></div>
          <div class="skeleton" style="height:14px;width:42px;"></div>
          <div class="skeleton" style="height:12px;width:75%;"></div>
        </div>
        <div class="skeleton" style="width:110px;height:110px;border-radius:18px;flex-shrink:0;"></div>
      </div>
    </div>

    <!-- Real menu (hidden until ready) -->
    <div id="menu-container" style="display:none">
      <!-- category groups injected by JS -->
    </div>

    <!-- Shows when all items filtered out -->
    <div class="empty-filter-msg" id="empty-filter-msg">
      <i class="fa-solid fa-leaf"></i>
      <p>No items match the current filter.</p>
    </div>

  </div><!-- /menu-section -->

  <!-- ══════════════════════════════════════════
       CART BAR  (structure kept identical)
  ══════════════════════════════════════════ -->
  <div id="cart-bar">
    <div class="cart-inner-left">
      <div class="cart-bag-wrap"><i class="fa-solid fa-bag-shopping"></i></div>
      <div class="cart-text-wrap">
        <p id="cart-summary" class="cart-summary-text">0 ITEMS | ₹0</p>
        <p class="cart-sub-text"><i class="fa-solid fa-bolt-lightning"></i> Extra charges may apply</p>
      </div>
    </div>
    <button class="cart-cta-btn" onclick="window.location.href='cart.html'">
      VIEW CART <i class="fa-solid fa-chevron-right"></i>
    </button>
  </div>

  <!-- ══════════════════════════════════════════
       SCRIPTS
  ══════════════════════════════════════════ -->
  <script src="home.js"></script>
  <script>
  /* ─────────────────────────────────────────────
     CONFIG: which items get tags & customisable
     Add item names here — easy to edit on mobile
  ───────────────────────────────────────────── */
  const BESTSELLER_ITEMS = [
    'Veg Momos', 'Chicken Momos', 'Paneer Tikka',
    'Butter Chicken', 'Biryani', 'Margherita Pizza'
  ];
  const MUSTTRY_ITEMS = [
    'Special Thali', 'Loaded Fries', 'Double Patty Burger'
  ];
  const CUSTOMISABLE_ITEMS = [
    'Veg Momos', 'Chicken Momos', 'Paneer Tikka',
    'Butter Chicken', 'Pizza', 'Burger', 'Sandwich',
    'Margherita Pizza', 'Double Patty Burger'
  ];

  /* ─────────────────────────────────────────────
     FILTER STATE
  ───────────────────────────────────────────── */
  let activeFilter = null; // null | 'veg' | 'nonveg'

  function toggleFilter(type) {
    activeFilter = (activeFilter === type) ? null : type;
    // update chip UI
    document.getElementById('filter-veg')   .classList.toggle('active', activeFilter === 'veg');
    document.getElementById('filter-nonveg').classList.toggle('active', activeFilter === 'nonveg');
    applyFilter();
  }

  function applyFilter() {
    const items   = document.querySelectorAll('.menu-item');
    let   visible = 0;
    items.forEach(item => {
      const isVeg = item.dataset.veg === 'true';
      let show = true;
      if (activeFilter === 'veg')    show = isVeg;
      if (activeFilter === 'nonveg') show = !isVeg;
      item.classList.toggle('hidden-by-filter', !show);
      if (show) visible++;
    });
    document.getElementById('empty-filter-msg').style.display =
      (visible === 0) ? 'block' : 'none';
  }

  /* ─────────────────────────────────────────────
     HEART / FAVOURITE TOGGLE
  ───────────────────────────────────────────── */
  document.getElementById('heart-btn').addEventListener('click', function() {
    this.classList.toggle('loved');
    const icon = document.getElementById('heart-icon');
    icon.className = this.classList.contains('loved')
      ? 'fa-solid fa-heart'
      : 'fa-regular fa-heart';
  });

  /* ─────────────────────────────────────────────
     STICKY CATEGORY NAV — IntersectionObserver
     Uses fixed positioning — toggle visible class only
  ───────────────────────────────────────────── */
  const catNav   = document.getElementById('cat-nav');
  const sentinel = document.getElementById('cat-nav-sentinel');
  const menuSec  = document.querySelector('.menu-section');

  const sentinelObs = new IntersectionObserver(entries => {
    const isHidden = !entries[0].isIntersecting;
    catNav.classList.toggle('visible', isHidden);
    /* Shift menu-section down by cat-nav height (≈44px) when nav is pinned */
    menuSec.style.paddingTop = isHidden ? '44px' : '0px';
  }, { threshold: 0 });
  sentinelObs.observe(sentinel);

  /* Scrollspy: highlight active category pill */
  function setupScrollSpy(categories) {
    const opts = { rootMargin: '-80px 0px -60% 0px', threshold: 0 };
    const obs  = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.id; // e.g. "cat-momos"
          document.querySelectorAll('.cat-nav-pill').forEach(p =>
            p.classList.toggle('active', p.dataset.target === id)
          );
          // auto-scroll active pill into view
          const activePill = document.querySelector(`.cat-nav-pill[data-target="${id}"]`);
          if (activePill) {
            activePill.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          }
        }
      });
    }, opts);
    categories.forEach(cat => {
      const el = document.getElementById('cat-' + cat.replace(/\s+/g, '-').toLowerCase());
      if (el) obs.observe(el);
    });
  }

  /* Pill click → smooth scroll to category */
  function scrollToCategory(catId) {
    const el = document.getElementById(catId);
    if (!el) return;
    /* top-bar ~62px + cat-nav ~44px + breathing room */
    const offset = 116;
    const top = el.getBoundingClientRect().top + window.scrollY - offset;
    window.scrollTo({ top, behavior: 'smooth' });
  }

  /* ─────────────────────────────────────────────
     BUILD BUTTON HTML
  ───────────────────────────────────────────── */
function makeBtnHTML(itemName, qty, price, rId) {
  // Safely strip any broken quotes
  const safeId = String(rId).replace(/['"]/g, ''); 
  
  if (qty > 0) {
    return `<div class="item-stepper">
      <button class="stepper-minus" onclick="updateCart(\`${itemName}\`,-1,${price},\`${safeId}\`)">−</button>
      <span class="stepper-count">${qty}</span>
      <button class="stepper-plus"  onclick="updateCart(\`${itemName}\`,1,${price},\`${safeId}\`)">+</button>
    </div>`;
  }
  return `<button class="item-add-single" onclick="updateCart(\`${itemName}\`,1,${price},\`${safeId}\`)">ADD</button>`;
}

  /* ─────────────────────────────────────────────
     HELPER: check customisable
  ───────────────────────────────────────────── */
  function isCustomisable(name) {
    return CUSTOMISABLE_ITEMS.some(c => name.toLowerCase().includes(c.toLowerCase()));
  }

  /* ─────────────────────────────────────────────
     MAIN PAGE INIT
  ───────────────────────────────────────────── */
    /* ─────────────────────────────────────────────
     MAIN PAGE INIT (LIVE API ADAPTER)
  ───────────────────────────────────────────── */
  document.addEventListener('DOMContentLoaded', async () => {
    const params = new URLSearchParams(window.location.search);
    const resId = params.get('id'); // MongoDB uses strings for IDs
    const API_BASE_URL = 'https://eatswada.onrender.com/api';

    if (!resId) return showErrorState();

    try {
      // 1. Fetch Restaurant Info and Menu in parallel for speed
      const [resResponse, menuResponse] = await Promise.all([
        fetch(`${API_BASE_URL}/restaurants/${resId}`),
        fetch(`${API_BASE_URL}/restaurants/${resId}/menu`)
      ]);

      if (!resResponse.ok || !menuResponse.ok) throw new Error("API Error");

      const resResult = await resResponse.json();
      const menuResult = await menuResponse.json();
      
      const restaurant = resResult.data;
      const groupedMenu = menuResult.data; // Backend already groups by category!

      /* ── Populate Info ── */
      document.title = restaurant.name + ' – Nearbite';
      document.getElementById('res-name').innerText = restaurant.name;
      document.getElementById('res-cuisine').innerText = restaurant.cuisineDisplay || restaurant.cuisine.join(', ');
      document.getElementById('res-rating-num').innerText = restaurant.rating || "NEW";
      document.getElementById('res-time').innerHTML = '<i class="fa-regular fa-clock"></i> ' + (restaurant.time || '30 mins');
      document.getElementById('res-distance').innerHTML = '<i class="fa-solid fa-location-dot"></i> ' + (restaurant.distance || '2 km');

      if (restaurant.offer) {
        document.getElementById('res-offer-text').innerText = restaurant.offer;
        document.getElementById('res-offer-banner').style.display = 'flex';
      }

      const categories = Object.keys(groupedMenu);
      const menuContainer = document.getElementById('menu-container');

      /* ── Build category nav pills ── */
      const navInner = document.getElementById('cat-nav-inner');
      navInner.innerHTML = categories.map((cat, i) => {
        const catId = 'cat-' + cat.replace(/\s+/g, '-').toLowerCase();
        return `<div class="cat-nav-pill ${i===0?'active':''}" data-target="${catId}" onclick="scrollToCategory('${catId}')">${cat}</div>`;
      }).join('');

      /* ── Build grouped menu HTML ── */
      let globalIdx = 0;
      menuContainer.innerHTML = categories.map(cat => {
        const catId = 'cat-' + cat.replace(/\s+/g, '-').toLowerCase();
        const items = groupedMenu[cat];

        const itemsHTML = items.map(item => {
          const key = item.name.replace(/\s+/g, '');
          const qty = cart[item.name] ? cart[item.name].quantity : 0;
          const price = item.price;
          const image = item.image || item.img || 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=200&auto=format&fit=crop&q=80';

          const isBest = BESTSELLER_ITEMS.some(b => item.name.toLowerCase().includes(b.toLowerCase()));
          const isMust = MUSTTRY_ITEMS.some(b => item.name.toLowerCase().includes(b.toLowerCase()));
          
          const tagHTML = isBest ? `<div class="item-tag bestseller"><i class="fa-solid fa-fire"></i> Bestseller</div>` : isMust ? `<div class="item-tag musttry"><i class="fa-solid fa-star"></i> Must Try</div>` : '';
          const ribbonHTML = isBest ? `<div class="img-ribbon"><i class="fa-solid fa-fire"></i> Best</div>` : isMust ? `<div class="img-ribbon green-ribbon"><i class="fa-solid fa-star"></i> Try</div>` : '';
          const customHTML = isCustomisable(item.name) ? `<span class="customisable-text">Customisable</span>` : '';

          const delay = (globalIdx++ * 0.04).toFixed(2);

          return `
            <div class="menu-item" data-veg="${item.isVeg ? 'true' : 'false'}" style="animation-delay:${delay}s">
              <div class="menu-item-left">
                <div class="veg-dot ${item.isVeg ? 'veg' : 'nonveg'}"><div class="dot"></div></div>
                ${tagHTML}
                <h3 class="item-name">${item.name}</h3>
                <p  class="item-price">₹${price}</p>
                <p  class="item-desc">${item.desc || 'Premium quality ' + item.name + ' prepared with authentic ingredients.'}</p>
              </div>
              <div class="menu-item-img-wrap">
                ${ribbonHTML}
                <img src="${image}" alt="${item.name}" onerror="this.src='https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=200&auto=format&fit=crop&q=80'">
                <div id="btn-container-${key}" class="item-btn-wrap">
                  ${makeBtnHTML(item.name, qty, price, "'"+resId+"'")} 
                </div>
                ${customHTML}
              </div>
            </div>`;
        }).join('');

        return `
          <div class="menu-cat-group" id="${catId}">
            <div class="menu-cat-header" onclick="toggleCategory(this)">
              <span class="menu-cat-title">${cat} <span class="menu-cat-count">(${items.length})</span></span>
              <i class="fa-solid fa-chevron-down menu-cat-chevron"></i>
            </div>
            <div class="menu-cat-items">${itemsHTML}</div>
          </div>`;
      }).join('');

      document.getElementById('menu-skeleton').style.display = 'none';
      document.getElementById('menu-container').style.display = 'block';
      setupScrollSpy(categories);
      renderCartBar();


  } catch (error) {
    alert("Crash details: " + error.message);
    console.error(error);
    showErrorState();
  }
});


  function showErrorState() {
     document.getElementById('menu-skeleton').style.display = 'none';
     document.getElementById('menu-container').style.display = 'block';
     document.getElementById('menu-container').innerHTML = `
        <div style="text-align:center;padding:60px 20px">
          <i class="fa-solid fa-server" style="font-size:48px;color:#e0e0e0;display:block;margin-bottom:16px"></i>
          <p style="font-size:17px;font-weight:800;color:#555">Server Connection Error</p>
          <button onclick="location.reload()" style="margin-top:20px;background:#FC8019;color:#fff;font-weight:800;font-size:13px;border:none;padding:12px 24px;border-radius:14px;">Try Again</button>
        </div>`;
  }


  /* ── Override updateCart for Restaurant Page ── */
  window.updateCart = function(itemName, change, price, rId) {
    if (!cart[itemName]) cart[itemName] = { quantity: 0, price, resId: rId };
    cart[itemName].quantity += change;
    if (cart[itemName].quantity <= 0) delete cart[itemName];

    const key       = itemName.replace(/\s+/g, '');
    const container = document.getElementById('btn-container-' + key);
    if (container) {
      const qty = cart[itemName] ? cart[itemName].quantity : 0;
      container.innerHTML = makeBtnHTML(itemName, qty, price, rId);
    }
    localStorage.setItem('nearbite_cart', JSON.stringify(cart));
    if (typeof renderCartBar === 'function') renderCartBar();
  };

  /* ─────────────────────────────────────────────
     COLLAPSIBLE CATEGORY
  ───────────────────────────────────────────── */
  function toggleCategory(headerEl) {
    headerEl.classList.toggle('collapsed');
    const itemsEl = headerEl.nextElementSibling;
    if (itemsEl) itemsEl.classList.toggle('collapsed');
  }
</script>
</body>
</html>
