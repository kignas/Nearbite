<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="view-transition" content="same-origin">
  <title>₹99 Store – </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #f4f4f6; padding-bottom: 140px; }

    /* ── STICKY HEADER ── */
    .store-header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }

    .header-top {
      padding: 14px 16px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .icon-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: #f3f3f5; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.15s, transform 0.12s;
      text-decoration: none;
    }
    .icon-btn:active { transform: scale(0.92); background: #eaeaed; }
    .icon-btn i { font-size: 13px; color: #333; }
    .header-title-wrap {}
    .header-title-row { display: flex; align-items: center; gap: 7px; }
    .header-title { font-size: 18px; font-weight: 900; color: #111; }
    .official-badge {
      background: #FC8019; color: #fff;
      font-size: 7px; font-weight: 900;
      padding: 2px 6px; border-radius: 5px;
      letter-spacing: 0.8px; text-transform: uppercase;
    }
    .header-sub { font-size: 10px; font-weight: 700; color: #bbb; margin-top: 2px; letter-spacing: 0.3px; }
    .header-actions { display: flex; gap: 10px; }

    /* Filter pills row */
    .filter-row {
      padding: 0 16px 12px;
      display: flex; gap: 8px; overflow-x: auto;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-sep { width: 1px; background: #eee; align-self: center; height: 20px; flex-shrink: 0; margin: 0 2px; }

    /* Veg + countdown sub-bar */
    .sub-bar {
      padding: 10px 16px;
      background: #fafafa;
      border-top: 1px solid rgba(0,0,0,0.05);
      display: flex; align-items: center; justify-content: space-between;
    }
    .veg-toggle-row { display: flex; align-items: center; gap: 8px; }
    .veg-label { font-size: 10px; font-weight: 800; color: #888; letter-spacing: 0.5px; text-transform: uppercase; }
    .veg-switch {
      width: 34px; height: 18px;
      background: #ddd; border-radius: 999px;
      position: relative; cursor: pointer;
      transition: background 0.25s;
    }
    .veg-switch.on { background: #16a34a; }
    .veg-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 14px; height: 14px;
      background: #fff; border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: transform 0.25s;
    }
    .veg-switch.on .veg-thumb { transform: translateX(16px); }

    .countdown-wrap { display: flex; align-items: center; gap: 6px; }
    .countdown-dot { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }
    .countdown-text { font-size: 10px; font-weight: 800; color: #ef4444; letter-spacing: 0.5px; font-family: 'Poppins', sans-serif; }

    /* ── MAIN CONTENT ── */
    main { padding: 16px 14px 0; }
    .items-found-label { font-size: 11px; font-weight: 800; color: #bbb; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 16px; }

    /* ── PRODUCT GRID ── */
    .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 12px; }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: #fff;
      border-radius: 20px;
      overflow: visible;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.05);
      padding-bottom: 14px;
    }

    /* Image section */
    .card-img-wrap {
      position: relative;
      margin: 0;
      border-radius: 19px 19px 0 0;
      overflow: hidden;
      background: #f8f8f8;
      aspect-ratio: 1;
    }
    .card-img-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }

    /* Price badge on image */
    .price-badge {
      position: absolute; bottom: 10px; right: 10px;
      background: #FC8019;
      color: black;
      font-size: 12px; font-weight: 900;
      padding: 4px 9px; border-radius: 9px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      letter-spacing: 0.2px;
    }

    /* Floating ADD/stepper on card */
    .card-btn-float {
      position: relative;
      display: flex; justify-content: center;
      margin-top: -14px;
      margin-bottom: 10px;
      z-index: 5;
    }
    .card-add-wrap {
      min-width: 88px; height: 34px;
      background: #fff;
      border: 1.5px solid #efefef;
      border-radius: 11px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .card-add-single {
      width: 100%; height: 100%; background: transparent; border: none;
      font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 800;
      color: #FC8019; letter-spacing: 0.6px; cursor: pointer;
      transition: background 0.12s;
    }
    .card-add-single:active { background: #fff8f2; }
    .card-stepper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: space-between; }
    .card-s-btn {
      width: 32px; height: 100%; background: transparent; border: none;
      font-size: 17px; font-weight: 700; color: #FC8019; cursor: pointer;
      font-family: 'Poppins', sans-serif;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s;
    }
    .card-s-btn:active { background: #fff8f2; }
    .card-s-count { font-size: 13px; font-weight: 900; color: #111; min-width: 18px; text-align: center; pointer-events: none; }

    /* Card body */
    .card-body { padding: 0 12px; }
    .card-meta-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .card-rating {
      display: inline-flex; align-items: center; gap: 3px;
      background: #f0faf5; border: 1px solid #c6ead8;
      border-radius: 6px; padding: 2px 6px;
    }
    .card-rating i { font-size: 8px; color: #1ba672; }
    .card-rating span { font-size: 10px; font-weight: 800; color: #1ba672; }
    .card-name { font-size: 13px; font-weight: 800; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
    .card-rest { font-size: 10px; font-weight: 600; color: #bbb; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Skeleton grid */
    .skel-card { background: #fff; border-radius: 20px; overflow: hidden; border: 1px solid rgba(0,0,0,0.05); }
    .skel-img { aspect-ratio: 1; }
    .skel-body { padding: 12px; display: flex; flex-direction: column; gap: 7px; }

    /* Empty state */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 60px 20px; }
    .empty-state i { font-size: 44px; color: #e0e0e0; margin-bottom: 14px; display: block; }
    .empty-state h3 { font-size: 16px; font-weight: 800; color: #555; }
    .empty-state p  { font-size: 12px; color: #bbb; margin-top: 6px; font-weight: 500; }
    
    /* ─── Premium Bottom Nav ─── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; height: 68px;
      background: rgba(255,255,255,0.98); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(0,0,0,0.05); display: flex; align-items: stretch;
      box-shadow: 0 -4px 24px rgba(0,0,0,0.06); z-index: 9999;
      padding-bottom: env(safe-area-inset-bottom);
      transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .bottom-nav-hidden { transform: translateY(100%); }

    .nav-item {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 4px; font-size: 10px; font-weight: 700; color: #94a3b8; text-decoration: none;
      position: relative; transition: color 0.2s ease; -webkit-tap-highlight-color: transparent;
    }
    /* Only the active tab turns Orange */
    .nav-item.active { color: #FC8019; }

    .nav-icon { font-size: 20px; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    .nav-item:active .nav-icon { transform: scale(0.8); transition: transform 0.1s ease-out; }

    /* The Swiggy-style Circle for Food */
    .nav-food-circle {
      width: 42px; height: 42px; border-radius: 50%;
      background: #f1f5f9; color: #94a3b8;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: all 0.3s ease; margin-bottom: 2px;
    }
    .nav-item.active .nav-food-circle {
      background: #FC8019; color: #fff;
      box-shadow: 0 4px 12px rgba(252,128,25,0.3);
    }
    .nav-item:active .nav-food-circle { transform: scale(0.85); transition: transform 0.1s ease-out; }

    .nav-new-badge {
      position: absolute; top: 6px; right: 12px;
      background: #ef4444; color: #fff; font-size: 7px; font-weight: 900;
      padding: 2px 5px; border-radius: 6px; letter-spacing: 0.5px;
    }
    
  </style>
</head>
<body>

<!-- ── Sticky Header ── -->
<header class="store-header">
  <div class="header-top">
    <div class="header-left">
      <a href="index.html" class="icon-btn"><i class="fa-solid fa-arrow-left"></i></a>
      <div class="header-title-wrap">
        <div class="header-title-row">
          <h1 class="header-title">₹99 Store</h1>
          <span class="official-badge">PRO</span>
        </div>
        <p class="header-sub">Quality Guaranteed · Free Delivery</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" onclick="window.location.href='search.html'"><i class="fa-solid fa-magnifying-glass"></i></button>
      <button class="icon-btn"><i class="fa-solid fa-share-nodes"></i></button>
    </div>
  </div>

  <!-- Filter pills -->
  <div class="filter-row no-scrollbar">
    <button onclick="setPriceFilter(99)"  id="filter-99"  class="filter-pill active">₹99 Store</button>
    <button onclick="setPriceFilter(149)" id="filter-149" class="filter-pill">₹149 Store</button>
    <div class="filter-sep"></div>
    <button onclick="setSortFilter()" id="sort-btn" class="filter-pill">
      Sort <i class="fa-solid fa-chevron-down" style="font-size:8px;margin-left:3px"></i>
    </button>
    <button onclick="setRatingFilter()" id="rating-btn" class="filter-pill">⭐ 4.0+</button>
  </div>

  <!-- Veg toggle + countdown -->
  <div class="sub-bar">
    <div class="veg-toggle-row">
      <span class="veg-label">Veg Only</span>
      <div class="veg-switch" id="veg99-switch" onclick="toggleVeg()">
        <div class="veg-thumb" id="veg99-thumb"></div>
      </div>
    </div>
    <div class="countdown-wrap">
      <div class="countdown-dot"></div>
      <span id="countdown-timer" class="countdown-text">ENDS IN 3:00:00</span>
    </div>
  </div>
</header>

<main>
  <p id="item-count" class="items-found-label">– ITEMS FOUND</p>

  <!-- Skeleton -->
  <div id="skeleton-grid" class="product-grid">
    <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skeleton" style="height:13px;width:70%;border-radius:6px"></div><div class="skeleton" style="height:11px;width:50%;border-radius:6px"></div></div></div>
    <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skeleton" style="height:13px;width:65%;border-radius:6px"></div><div class="skeleton" style="height:11px;width:45%;border-radius:6px"></div></div></div>
    <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skeleton" style="height:13px;width:75%;border-radius:6px"></div><div class="skeleton" style="height:11px;width:55%;border-radius:6px"></div></div></div>
    <div class="skel-card"><div class="skel-img skeleton"></div><div class="skel-body"><div class="skeleton" style="height:13px;width:60%;border-radius:6px"></div><div class="skeleton" style="height:11px;width:40%;border-radius:6px"></div></div></div>
  </div>

  <div id="under99-list" class="product-grid" style="display:none"></div>
</main>


<!-- ══════════════════════════════════════════
     BOTTOM NAVIGATION
══════════════════════════════════════════ -->
<nav class="bottom-nav">
  
  <a href="index.html" class="nav-item active"> 
    <div class="nav-food-circle"><i class="fa-solid fa-bowl-food"></i></div>
    <span>Food</span>
  </a>

  <a href="under99.html" class="nav-item">
    <i class="fa-solid fa-tag nav-icon"></i>
    <span>99 Store</span>
    <span class="nav-new-badge">NEW</span>
  </a>

  <a href="orders.html" class="nav-item">
    <i class="fa-solid fa-receipt nav-icon"></i>
    <span>Orders</span>
  </a>
</nav>


<script src="home.js"></script>
<script src="under99.js"></script>
<script src="cart-bar.js"></script>
<script>
  // ── 1. THE SWIGGY-STYLE FETCH ENGINE (NOW IN EATSWADA ORANGE) ──
  window.renderItems = async function() {
    const listEl = document.getElementById('under99-list');
    const skeleton = document.getElementById('skeleton-grid');
    const countEl = document.getElementById('item-count');
    const API_BASE_URL = 'https://eatswada.onrender.com/api';
    
    if (!listEl) return;

    // Cache Buster v8
    const cachedData = sessionStorage.getItem('es_under99_data_v8');
    let items = [];

    if (cachedData && cachedData !== "[]") {
      items = JSON.parse(cachedData);
      if (skeleton) skeleton.style.display = 'none';
    } else {
      if (skeleton) skeleton.style.display = 'grid';
      listEl.style.display = 'none';

      try {
        const response = await fetch(`${API_BASE_URL}/restaurants/under99`);
        const result = await response.json();
        const rawData = Array.isArray(result.data) ? result.data : (Array.isArray(result) ? result : []);

        if (rawData.length === 0) throw new Error("Backend connected, but 0 items found.");

        items = rawData.map(dbItem => {
          let cleanPrice = typeof dbItem.price === 'number' ? dbItem.price : parseFloat(String(dbItem.price).replace(/[^\d.]/g, '')) || 99;
          let rId = 'unknown', rName = 'EatSwada Partner', rRating = 4.0;

          if (dbItem.restaurant && typeof dbItem.restaurant === 'object') {
            rId = dbItem.restaurant._id || dbItem.restaurant.id || 'unknown';
            rName = dbItem.restaurant.name || 'EatSwada Partner';
            rRating = dbItem.restaurant.rating || 4.0;
          } else if (dbItem.restaurant) {
            rId = dbItem.restaurant; 
          }

          return {
            name: dbItem.name || 'Special Item',
            price: cleanPrice,
            isVeg: Boolean(dbItem.isVeg),
            img: dbItem.image || dbItem.img || '', 
            resId: rId,
            resName: rName,
            resRating: rRating
          };
        });

        sessionStorage.setItem('es_under99_data_v8', JSON.stringify(items));
      } catch (error) {
        if (skeleton) skeleton.style.display = 'none';
        listEl.style.display = 'block';
        listEl.innerHTML = `<div style="text-align:center; padding:40px 20px;"><h3 style="color:#ef4444;">Connection Error</h3><button onclick="sessionStorage.clear(); window.location.reload();" style="margin-top:16px; padding:10px 20px; border-radius:12px; background:#FC8019; color:#fff; border:none; font-weight:800;">Retry</button></div>`;
        return;
      }
    }

    // Apply frontend filters
    let filteredItems = items.filter(item => {
      const maxP = typeof currentMaxPrice !== 'undefined' ? currentMaxPrice : 99;
      const onlyVeg = typeof vegOnly99 !== 'undefined' ? vegOnly99 : false;
      const inRange = maxP === 99 ? item.price <= 100 : item.price <= 150;
      return inRange && (!onlyVeg || item.isVeg);
    });

    if (typeof sortByRating !== 'undefined' && sortByRating) {
      filteredItems.sort((a,b) => parseFloat(b.resRating) - parseFloat(a.resRating));
    }

    if (countEl) countEl.innerText = 'ALL ' + filteredItems.length + ' ITEMS';
    if (skeleton) skeleton.style.display = 'none';
    
    listEl.style.display = 'grid';
    listEl.style.gap = '24px 12px';

    if (filteredItems.length === 0) {
      listEl.style.display = 'block'; 
      listEl.innerHTML = `<div style="text-align:center; padding: 60px 20px;"><i class="fa-solid fa-bowl-food" style="font-size:44px; color:#e0e0e0; margin-bottom:14px;"></i><h3 style="font-size:16px; font-weight:800; color:#555;">No items match filters</h3><button onclick="sessionStorage.clear(); window.location.reload();" style="margin-top:16px; padding: 12px 24px; border-radius: 12px; border: none; background: #FC8019; color: #fff; font-weight: 800; cursor: pointer;">Reset Data</button></div>`;
      return;
    }

    let cartMemory = {};
    try { cartMemory = JSON.parse(localStorage.getItem('nearbite_cart')) || {}; } catch(e){}

    listEl.innerHTML = filteredItems.map((item, idx) => {
      const key = item.name.replace(/\s+/g,'');
      const qty = cartMemory[item.name] ? cartMemory[item.name].quantity : 0;
      
      const safeName = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const safeId = String(item.resId).replace(/['"]/g, '');

      const originalPrice = Math.floor(item.price * 1.4);

      // ⚡ UPDATED: EATSWADA ORANGE ADD BUTTONS
      const btnHTML = qty > 0
        ? `<div style="display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #FC8019;border-radius:8px;width:72px;height:32px;overflow:hidden;box-shadow:0 2px 6px rgba(252,128,25,0.15);">
             <button onclick="updateCart('${safeName}', -1, ${item.price}, '${safeId}')" style="width:24px;height:100%;border:none;background:transparent;color:#FC8019;font-weight:900;font-size:16px;cursor:pointer;">−</button>
             <span style="font-size:13px;font-weight:800;color:#FC8019;">${qty}</span>
             <button onclick="updateCart('${safeName}', 1, ${item.price}, '${safeId}')" style="width:24px;height:100%;border:none;background:transparent;color:#FC8019;font-weight:900;font-size:14px;cursor:pointer;">+</button>
           </div>`
        : `<button onclick="updateCart('${safeName}', 1, ${item.price}, '${safeId}')" style="width:72px;height:32px;background:#fff;border:1px solid #f9ded0;border-radius:8px;color:#FC8019;font-weight:800;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,0.05);cursor:pointer;">ADD</button>`;

      const vegIcon = item.isVeg 
        ? `<div style="width:12px;height:12px;border:1.5px solid #16a34a;border-radius:2px;display:flex;align-items:center;justify-content:center;"><div style="width:6px;height:6px;background:#16a34a;border-radius:50%;"></div></div>`
        : `<div style="width:12px;height:12px;border:1.5px solid #dc2626;border-radius:2px;display:flex;align-items:center;justify-content:center;"><div style="width:0;height:0;border-left:3.5px solid transparent;border-right:3.5px solid transparent;border-bottom:6px solid #dc2626;"></div></div>`;

      return `
        <div style="display:flex;flex-direction:column;gap:10px;animation-delay:${idx*0.04}s" class="food-card-animate">
          
          <div style="width:100%;padding-top:100%;position:relative;border-radius:16px;overflow:hidden;background:#f1f5f9;border:1px solid rgba(0,0,0,0.03);">
            <img src="${item.img}" alt="${item.name}" loading="lazy" style="position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">
          </div>
          
          <div style="display:flex;flex-direction:column;gap:4px;padding:0 2px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              ${vegIcon}
              <div style="background:#f0fdf4;color:#16a34a;font-size:10px;font-weight:800;padding:2px 6px;border-radius:6px;display:flex;align-items:center;gap:3px;">
                <i class="fa-solid fa-star" style="font-size:8px;"></i> ${item.resRating}
              </div>
            </div>
            
            <div style="font-size:14px;font-weight:700;color:#1f2937;line-height:1.2;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">
              ${item.name}
            </div>
            
            <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:2px;">
              <div style="display:flex;flex-direction:column;gap:2px;">
                <span style="font-size:10px;color:#9ca3af;text-decoration:line-through;">₹${originalPrice}</span>
                <span style="font-size:13px;font-weight:800;color:#111;">
                  <span style="background:#fef08a;padding:0 3px;border-radius:3px;">₹${item.price}</span>
                </span>
              </div>
              <div id="btn-container-${key}">${btnHTML}</div>
            </div>
            
            <div style="display:flex;justify-content:space-between;align-items:center;margin-top:4px;">
              <span style="font-size:11px;font-weight:500;color:#6b7280;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:55%;">${item.resName}</span>
              <span style="font-size:10px;font-weight:500;color:#6b7280;">30-35 mins</span>
            </div>
          </div>

        </div>`;
    }).join('');

    if (typeof window.renderCartBar === 'function') window.renderCartBar();
  };

  // ── 2. THE BULLETPROOF UPDATE FUNCTION (NOW IN ORANGE) ──
  window.updateCart = function(itemName, change, price, rId) {
    let cartMemory = JSON.parse(localStorage.getItem('nearbite_cart')) || {};
    if (!cartMemory[itemName]) cartMemory[itemName] = { quantity: 0, price, resId: rId };
    cartMemory[itemName].quantity += change;
    if (cartMemory[itemName].quantity <= 0) delete cartMemory[itemName];

    const key = itemName.replace(/\s+/g,'');
    const container = document.getElementById('btn-container-' + key);
    
    if (container) {
      const qty = cartMemory[itemName] ? cartMemory[itemName].quantity : 0;
      const safeName = itemName.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const safeId = String(rId).replace(/['"]/g, ''); 

      // ⚡ UPDATED: EATSWADA ORANGE ADD BUTTONS
      if (qty > 0) {
        container.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:space-between;background:#fff;border:1px solid #FC8019;border-radius:8px;width:72px;height:32px;overflow:hidden;box-shadow:0 2px 6px rgba(252,128,25,0.15);">
             <button onclick="updateCart('${safeName}', -1, ${price}, '${safeId}')" style="width:24px;height:100%;border:none;background:transparent;color:#FC8019;font-weight:900;font-size:16px;cursor:pointer;">−</button>
             <span style="font-size:13px;font-weight:800;color:#FC8019;">${qty}</span>
             <button onclick="updateCart('${safeName}', 1, ${price}, '${safeId}')" style="width:24px;height:100%;border:none;background:transparent;color:#FC8019;font-weight:900;font-size:14px;cursor:pointer;">+</button>
           </div>`;
      } else {
        container.innerHTML = `<button onclick="updateCart('${safeName}', 1, ${price}, '${safeId}')" style="width:72px;height:32px;background:#fff;border:1px solid #f9ded0;border-radius:8px;color:#FC8019;font-weight:800;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,0.05);cursor:pointer;">ADD</button>`;
      }
    }

    localStorage.setItem('nearbite_cart', JSON.stringify(cartMemory));
    if (typeof window.updateGlobalCart === 'function') window.updateGlobalCart();
  };

  // ── 3. FILTER & SCROLL LOGIC ──
  window.toggleVeg = function() {
    if(typeof vegOnly99 !== 'undefined') vegOnly99 = !vegOnly99;
    const sw = document.getElementById('veg99-switch');
    if (sw) sw.classList.toggle('on');
    window.renderItems(); 
  };

  window.addEventListener('DOMContentLoaded', window.renderItems);

  const bottomNav = document.querySelector('.bottom-nav'); 
  let lastScrollTop = 0;
  window.addEventListener('scroll', () => {
    let currentScroll = window.pageYOffset || document.documentElement.scrollTop;
    if (Math.abs(lastScrollTop - currentScroll) <= 15) return;
    if (currentScroll > lastScrollTop && currentScroll > 180) {
      if (bottomNav) bottomNav.classList.add('bottom-nav-hidden'); 
    } else {
      if (bottomNav) bottomNav.classList.remove('bottom-nav-hidden'); 
    }
    lastScrollTop = currentScroll;
  }, { passive: true }); 
</script>
<style>
  @keyframes cardFadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  /* Reverted Hero Header: Natural scrolling, zero lag */
  .hero-header {
    position: relative !important;
    top: auto;
    z-index: 100 !important;
    /* Removed all transform transitions so the GPU does no work here */
  }
  
  /* Make sure body padding is reset to normal */
  body {
    padding-top: 0 !important;
  }
  
  /* Kept the bottom nav slide class */
  .bottom-nav-hidden { transform: translateY(100%); }
</style>
</body>
</html>
