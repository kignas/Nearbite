<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>₹99 Store – Nearbite</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">

  <style>
    body { background: #f6f7fb; }
    
    /* Grid product cards improvement */
    .grid.grid-cols-2 > a,
    .grid.grid-cols-2 > div[class*="flex flex-col"] {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .grid.grid-cols-2 > a:hover {
      transform: translateY(-3px);
    }
    
    /* Image area rounding */
    .grid img { border-radius: 18px; }
    
    /* ADD button on grid cards */
    .w-full.bg-white.border.text-green-600 {
      border-color: rgba(252,128,25,0.3) !important;
      color: #FC8019 !important;
      font-weight: 800 !important;
      border-radius: 12px !important;
      box-shadow: 0 2px 8px rgba(252,128,25,0.12) !important;
      transition: all 0.2s ease !important;
    }
    .w-full.bg-white.border.text-green-600:active { 
      transform: scale(0.95) !important;
      background: #fff4eb !important;
    }
    
    /* Cart bar */
    #cart-bar {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%) !important;
      border-radius: 20px !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.35) !important;
    }
    #cart-bar button:last-child {
      background: #FC8019 !important;
      border: none !important;
      padding: 10px 18px !important;
      border-radius: 14px !important;
      box-shadow: 0 4px 14px rgba(252,128,25,0.35) !important;
    }
    
    /* Countdown pulse */
    #countdown-timer { animation: countdownFlicker 2s ease infinite alternate; }
    @keyframes countdownFlicker {
      from { opacity: 1; }
      to   { opacity: 0.7; }
    }
    
    /* Active filter pill */
    .filter-pill.active {
      background: #fff4eb !important;
      color: #FC8019 !important;
      border-color: rgba(252,128,25,0.3) !important;
    }
    
    img { loading: lazy; }
  </style>
</head>
<body class="bg-[#F8F9FA]" style="padding-bottom: 140px;">

<!-- ── Sticky Header ── -->
<header class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
  <div class="pt-5 pb-3 px-5">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3.5">
        <a href="index.html" class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center active:scale-90 transition-transform">
          <i class="fa-solid fa-arrow-left text-sm text-gray-800"></i>
        </a>
        <div>
          <div class="flex items-center gap-2">
            <h1 class="font-black text-[18px] text-gray-900">₹99 Store</h1>
            <span class="bg-orange-500 text-white text-[7px] px-1.5 py-0.5 rounded font-black uppercase tracking-widest">OFFICIAL</span>
          </div>
          <p class="text-[10px] font-semibold text-gray-400 mt-0.5 uppercase tracking-wider">Quality Guaranteed</p>
        </div>
      </div>
      <div class="flex gap-2">
        <button onclick="window.location.href='search.html'" class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center">
          <i class="fa-solid fa-magnifying-glass text-xs text-gray-700"></i>
        </button>
        <button class="w-9 h-9 rounded-full bg-gray-100 flex items-center justify-center">
          <i class="fa-solid fa-share-nodes text-xs text-gray-700"></i>
        </button>
      </div>
    </div>

    <!-- Filter Pills -->
    <div class="flex gap-2 overflow-x-auto no-scrollbar pb-1">
      <button onclick="setPriceFilter(99)"  id="filter-99"  class="filter-pill active">₹99 Store</button>
      <button onclick="setPriceFilter(149)" id="filter-149" class="filter-pill">₹149 Store</button>
      <div class="w-px h-6 bg-gray-100 mx-1 self-center flex-shrink-0"></div>
      <button onclick="setSortFilter('rating')" id="sort-btn" class="filter-pill flex items-center gap-1">
        Sort <i class="fa-solid fa-chevron-down text-[8px]"></i>
      </button>
      <button onclick="setRatingFilter()" id="rating-btn" class="filter-pill">Ratings 4.0+</button>
    </div>
  </div>

  <!-- Sub-bar: Veg toggle + countdown -->
  <div class="px-5 py-2 bg-gray-50 flex items-center justify-between border-t border-gray-100">
    <div class="flex items-center gap-2">
      <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest">VEG ONLY</span>
      <label class="relative cursor-pointer" onclick="toggleVeg()">
        <div id="veg99-track" class="w-8 h-4 bg-gray-200 rounded-full relative transition-colors duration-300">
          <div id="veg99-thumb" class="absolute top-0.5 left-0.5 w-3 h-3 bg-white rounded-full shadow-sm transition-transform duration-300"></div>
        </div>
      </label>
    </div>
    <div class="flex items-center gap-1.5">
      <div class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></div>
      <p id="countdown-timer" class="text-[9px] font-black text-red-500 uppercase tracking-tight">ENDS IN 2:40:00</p>
    </div>
  </div>
</header>

<main class="px-5 mt-5">
  <div class="flex items-center justify-between mb-5">
    <h2 id="item-count" class="text-[11px] font-black text-gray-400 uppercase tracking-widest">– ITEMS FOUND</h2>
  </div>
  <!-- Skeleton -->
  <div id="skeleton-grid" class="grid grid-cols-2 gap-x-4 gap-y-10">
    <div class="flex flex-col gap-3"><div class="skeleton w-full aspect-square rounded-[2rem]"></div><div class="skeleton h-4 w-3/4 rounded"></div><div class="skeleton h-3 w-1/2 rounded"></div></div>
    <div class="flex flex-col gap-3"><div class="skeleton w-full aspect-square rounded-[2rem]"></div><div class="skeleton h-4 w-3/4 rounded"></div><div class="skeleton h-3 w-1/2 rounded"></div></div>
    <div class="flex flex-col gap-3"><div class="skeleton w-full aspect-square rounded-[2rem]"></div><div class="skeleton h-4 w-3/4 rounded"></div><div class="skeleton h-3 w-1/2 rounded"></div></div>
    <div class="flex flex-col gap-3"><div class="skeleton w-full aspect-square rounded-[2rem]"></div><div class="skeleton h-4 w-3/4 rounded"></div><div class="skeleton h-3 w-1/2 rounded"></div></div>
  </div>
  <div id="under99-list" class="grid grid-cols-2 gap-x-4 gap-y-10 hidden"></div>
</main>

<!-- ── Cart Bar ── -->
<div id="cart-bar">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center">
      <i class="fa-solid fa-bag-shopping text-white text-sm"></i>
    </div>
    <div>
      <p id="cart-summary" class="text-[13px] font-black text-white tracking-tight leading-none">0 ITEMS | ₹0</p>
      <p class="text-[9px] text-white/70 font-semibold mt-0.5 flex items-center gap-1">
        <i class="fa-solid fa-bolt-lightning text-yellow-300 text-[8px]"></i> Fast Delivery
      </p>
    </div>
  </div>
  <button onclick="window.location.href='cart.html'"
          class="flex items-center gap-1.5 text-white font-black text-[12px] bg-white/15 px-4 py-2 rounded-xl border border-white/20 active:bg-white/25 transition-colors">
    VIEW CART <i class="fa-solid fa-chevron-right text-[10px]"></i>
  </button>
</div>

<!-- ── Bottom Navigation ── -->
<nav class="bottom-nav">
  <a href="index.html" class="nav-item">
    <svg fill="currentColor" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </a>
  <a href="under99.html" class="nav-item active">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
    <span>₹99 Store</span>
  </a>
  <a href="search.html" class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    <span>Search</span>
  </a>
  <a href="orders.html" class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    <span>Orders</span>
  </a>
  <a href="profile.html" class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
    <span>Profile</span>
  </a>
</nav>

<script src="home.js"></script>
<script src="under99.js"></script>
</body>
</html>
